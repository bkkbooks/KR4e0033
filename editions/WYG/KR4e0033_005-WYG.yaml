body:
  text: 尚絅齋集巻五明童冀撰北遊集五言古詩過盧溝橋夜度盧溝橋隠隠聞寒更居人久已寐行子尚宵征青天四埀幕仰見北斗横石梁河界漢䦨下倚空明朔風凄以寒況乃霜露零我行豈不勞簡書嚴有程同行荷戈卒萬里赴邉城我身弗遑恤念之感中情題鄧伯言詩集時雨滌煩暑焚香坐清晨開軒面山色有客過我門袖䘖珠玉篇髙論懸河翻清辭及妙語往往與道隣嗟予生苦晚弗獲窺道真詎意衰謝餘正始乃復聞古人不可見古道良未湮俯仰三嘆息永言懐古人題朱節婦詩巻深州人洛陽三月春風起吹落南園桃與李紛紛飛逐馬蹄塵不學芙蓉抱霜死張家女兒夫蚤亡間闗戎馬隨姑嫜當年紅顔若桃李即今白髪如秋霜百年世事隨流水留得芳名照青史君不見東家桃李移西家年年嵗嵗開春花答衍公約㸔杏花城南招提紅杏花春風嵗嵗開晴霞燕城自昔少春色出門開眼惟風沙去年抱疾卧官舍聞道花開已花謝東君不念客鄉愁十日春光不相借起來繞樹行嘆嗟落紅滿地春日斜旋掇殘英寘懐袖留得餘香歸瀹茶今年二月春光早花開更比年時好出門十日九愆期復恐韶華閒過了一年春事寒食天節物驚心思少年揚鞭載酒城東道䌓華一夢隨飛煙即今老作他鄉客每藉春光􅇺離索裁詩先為報花神莫教一夜東風惡衍師見和因再次韻曲江昔年千樹花馬啼踏水翻明霞春風一夢生白髪幅巾千里衝黄沙嵗月閱人如傳舍過眼榮枯更代謝百年歡樂能幾何一日清閒不相借醉來自笑還自嗟挑燈坐待窗月斜明朝擬赴㸔花約汲泉旋試䝉山茶隣雞催人故鳴早起看樓頭天色好東家蹇驢許相借惜負詩囊無便了人生行止本由天居然負約如去年百年何時有暇日三月清明過禁煙老來羞作看花客還擬持觴􅇺離索落紅一任滿蒼苔收拾煎酥也不惡三次韻簡衍師祗園何年天雨花春風兩樹栖丹霞蒼苔嵗嵗落紅滿不數布地黄金沙上人西來住王舍過眼空花任開謝兩年約我送春歸半榻白雲許相借新詩脫口猶咄嗟展巻坐玩山月斜一自鄉山别婁約十年不試趙州茶客裏相逢恨不早道義相忘無醜好花前幾約共凭䦨身外多愁未能了黄塵世事相拘牽况我齒髮非壯年流光催人劇奔電病眼看花如隔煙人生未信長為客早晚南還􅇺離索迎門稚子笑牽衣此日老懷良不惡海子橋大風即事一首韓彦思王宗禮偕王足不良于行故詩中及之海子橋西風大作撲面驚砂似飛雹蹇驢局促驅不前僕夫睢盱行屢却傍人指㸃笑相語誰遣先生此行樂韓公半醉紗㡌偏童子竦立髙吟肩惟有王郎跛能履拄杖落手心茫然君平杖頭無酒錢羊市街西尋鄭䖍從此避風如避箭閉門經月不相見剝啄移時始啓闗旋吸清泉沃塵面墻頭濁醪如井泉沈醉不虞歸路逺城南招提老賛公三日不見心忡忡回鞭便欲造虚白驚見斜陽天際紅歸來獨坐増永慨三復平生康節戒青燈永夜長自憐白首相隨惟影在故山萬里孤雲飛一身憔悴誰復知從今風雨閒柴扉養取病鶴江南歸衍師見和因再次韻少年一鼔氣方作出語驚人走氷雹詞林無日不吟哦騷壇有敵皆奔却怵心劌腎良亦苦抵掌掀髯方自樂中年始悟學術偏閉門黙坐聴息肩徒知出處亦漫爾未信行藏非偶然畊田而食鑿井飲豈有奪攘并矯䖍暮年忽作弦上箭楚水吳山得相見孤帆一日下渚溪十年不覩廬山面今年又復上燕山囬首家山路逾逺東林邂逅逢逺公常時􅇺我憂心忡祗園共踏寒月白禪林許看春花紅客鄉慎勿生嘆慨老境情懐須自戒萬里休嗟路逺遥百年但願身長在秋風旋鴈將南飛尺書先報雲山知明年春雨黄獨肥釀泉待我山中歸三用韻自警詩亡然後春秋作灾異不獨書雨雹一朝夾谷㑹强齊片言立使萊兵却當時門人誰好學陋巷獨稱顔氏樂後人往往學術偏自謂聖賢堪比肩董賈猶存二三䇿荀揚其然豈其然易經王弼詩鄭𤣥春秋何休禮服䖍東南之美僅竹箭肅慎楛矢何曽見千載之下得程朱夢見聖人猶覿面六經自此昭日星伊洛未覺洙泗逺我生獨後此數公望道未見心忡忡秋霜暗添短鬢白春酒不借衰顔紅憂來中夜恒嘆慨猶幸平生守三戒志勤道逺力已㣲夙興夜寐心長在春風花開秋葉飛嵗不待人知不知青年幸從君子學白頭庶免小人歸送郡庠諸貢士㑹試聖明紀元首洪武二十三年嵗庚午北平貢舉數已三南宫科第誰為伍朝廷在處興學校河朔于今似鄒魯燕城自昔號多士黌舍書聲喧兩廡諸生結髮守章句五夜挑燈坐風雨十年經傳久鑚研一旦雲霄共軒翥張生蚤誦毛氏詩不泥漢儒專訓詁郭生丱嵗學爻象三絶韋編感尼父晉張二子業啖趙頗知褒貶異衮斧一經直筆重王正三傳闕疑存夏五王郎曽窺孔壁書古文魯魚參石鼓苑生丁夘已䇿名三載願學心更苦諸子同生聖明世聨鑣共上春官部黄河十月水無氷髙帆大艦鳴雙櫓京師人才輻輳地車馬駢闐耀珪組四夷萬里玉帛朝七旬兩階干羽舞天人三䇿對大廷忠孝百年事明主白玉階前集鳳麟黄金榜上題龍虎錦衣遄歸榮里閭青史流芳照今古老我尚䝉稽古力嵗縻廩粟知何補聖恩浩蕩天地寛要使疲癃咸得所朽壤猶能出芝菌良材自可充梁柱青雲子幸成令名白首我歸老環堵擊壤康衢樂太平日作歌詩歌舜禹題商集賢畫天下幾人學董元近代復數商集賢集賢畫山唯畫意不將㸃畫分清妍乾坤元氣尚渾沌百年此意無人傳我生髫齔愛公畫亂離不見三十年大明開天四海一江山在處還依然欲求公畫不可得夢中往往看雲煙昔年為客上湘水雲山好處長留連九華秀色開菡萏匡廬瀑布晴虹懸洞庭雪浪𣺌無際華盖曉峯青可憐今年又上燕山道慿髙四望惟青天舟行一月少山色北風吹沙塵晝昏朅來燕市厭闤闠旦暮車馬争駢闐蓬萊真境偶一到拭眼復見公山川當時舊物無一在嗟我與公良無縁公家子孫今白髪十年湖海相周旋客鄉邂逅重相遇趣裝又上通州船我家金華山色裏雲間白石如羊眠柴門小橋枕流水溪聲久不聽潺湲昨宵又作故人夢耳邉忽似聞清􅆐松根茯苓如斗大便欲歸去求神仙安得壺公縮地法南歸道里猶五千官船利渉急於箭一月可到家山前白頭儻獲遂此願畊雲自種南山田和衍公約看杏花詩韻客鄉不識花時節官舍蕭條如巷陌閉門猶恐迎朔風况復看花事行樂前年又得殷師疾往往空中聞打麥囬思少年真一夢幸免泥塗陷雙脚非無萬里封侯志膽落䋲橋懸度索亦欲州縣謀斗升束帶晨趨謁方伯坐是蹉跎四十年不知兩鬢如霜白東鄰有子早宦游駿馬雕鞍日馳躍西鄰有客亦從軍十載歸來門列㦸書生半世成何事出門却笑天地窄南北驅馳今幾年猶喜青衫尚如昨去冬十月上燕薊朔風入懐衣縫折敝裘百日走黄沙縱有清泉誰浣濯平生故人幸相值一一襟懐皆磊落四海誰非兄弟親百年同是乾坤客興來載酒數相過如此客懐良不惡昨霄忽作鄉山夢便欲飛書謝婁約來春玉版行可叅擬約參寥同大嚼暑雨即事感懐江南五月黄梅雨溽暑熏蒸無燥土燕山道上走黄塵不識南中霖潦苦今年燕山暑雨多六月日日聞滂沱牀頭汗衣欲沾體門前流潦㸔成河東家墻頹空四壁西家水入深三尺羣蛙白日堂上鳴孤螢後夜梁間出束薪斗米不論錢城中比屋無炊煙泥塗不異犀浦道禁火翻同寒食天我生炎方困溽濕不知朔土猶蒸欝朔南由來地勢偏氣候一月相後先我願天公憐逺客白頭早遂歸鄉約秪今溽暑行已過嵗晚苦寒其奈何七言近體謁岳鄂王墓鄂王遺廟空山裏斜日荒煙澹暮嵐一死曽㣲贖身百孤忠寜愧過河三戰場有敵皆奔北冢木無枝不向南白髪書生謁祠下巖泉一勺酹芳甘發龍江己巳十月帝城惜别重依依櫂發龍江已夕暉十月尋常寒食短孤帆揺颺暮雲飛天空萬里海青逺水落三冬淮白肥却憶故鄉鱸正美季鷹何事不思歸儀真舟中石頭城下雨如煙倦客不知方醉眠中宵舟移揚子岸拂曉人喚真州船推篷喜見紅日上望眼欲到青天邊一夕風波夢中過百年身世真悠然廣陵道中廣陵自昔號繁華過眼春風一夢賖商女隔江歌玉樹仙人騎鶴問瓊花荒村石屋無歸燕逺道斜陽有暮鴉二十四橋明月夜清光此夜屬誰家韓信廟淮隂事業已荒凉猶幸封侯在故鄉古廟有碑眠宿雨長林無樹掛斜陽曽聞杖䇿歸真主安用論功覔假王千古是非曽未定英雄回首事茫茫黄河舟中述懐二首昔年承召沐恩波投老飄零感慨多清夢常時懐絳􅇅白頭今日過黄河朔雲鴻鴈來邉塞落日牛羊散近坡最憶故山茅屋好春風日夜長烟蘿其二解纜龍江暮雨寒朔風廽薄楚雲間五更酒醒惟聞鴈一月舟行不見山半世悠悠孤枕夢百年擾擾幾人聞勞生宇内成何事獨羨斜陽倦鳥還過徐州十月朔風辭上京孤舟一月到彭城黄河九曲流無盡白髪數莖猶有情戯馬臺荒沙草合釣魚船小浪花輕老來不負壯㳺志又指燕山問去程霜天早行茅店雞聲落月孤車聲催我上征途裹裳猶訝刀侵指拂面不知氷在鬚草屋幾家門尚掩野橋何處酒堪沽却思曩嵗禪房宿日上山牕正擁爐庚午立春日偶成一别鄉闗十五年寸心日夜望歸田孤舟暮雨滄江上茅屋秋風夕照邉歸夢常時隨越鳥倦逰何意復幽燕小樓昨夜東風起又見天邉斗柄旋送朱長史致仕還鄉鳳城曉日軟塵紅鶴髪承恩出九重千里鄉闗淮水北五雲宫闕大江東漢廷清議賢䟽傅楚地耆年重白公想見到家頻致客擊鮮釃酒醉春風春意堂燕山趙氏隠居好種徳幾年春意深見客不談當世事滿腔渾貯活人心紫芝采處雲生袖丹杏開時錦作林老我故園歸未得時來花下聽鳴琴登崇文閣春明試上崇文閣病起猶憐歩武輕遲暮逺為千里客登臨不盡百年情淡雲天外青山小斜日煙中白鳥明皓首江湖歸未得故園春草又應生石林為金道逺賦鶴髪仙翁匪石心何年曽種石為林参差玉樹參天秀礧砢雲根入地深雨榦有苔常帶潤月枝無葉自成隂季倫當日何曽見鐵網徒勞海底尋庚午中秋貢院述懐呈同志夜久棘闈風露涼盍簮邂逅至公堂百年幾度㸔明月千里相逢各異鄉謾把金尊斟緑醑羞將白髮對清光少年獨羨蟾宫路折桂歸來兩袖香酬胡季安學正見和何處玉簫吹晚凉月明如水浸華堂神㳺自信非人境清夢長思在帝鄉天上漏聲傳鳳闕雲間劍氣射龍光燕山此夕知何夕猶醉揚州滿殿香中秋述懐去年江上送歸舟迢逓心隨江水流千里異鄉猶昨日一年孤館又中秋青山有恨能遮眼白髪無情自滿頭謾說今宵好明月清光兩地照人愁次韻衍師約㸔杏花去年已負㸔花約今嵗㸔花復後期白社雲深難載酒彩毫春盡謾題詩東風有恨埋芳草香雪無情滿故枝猶喜家山無恙在明年歸看未開時次韻酬衍師時病頭風未愈故詩中及之白首論交得衍公片雲猶恨隔西東百年謾說三生舊十日曽無一笑同大藥何能消鬢雪新詩自可愈頭風嵗寒心事如松栢不學春花旦暮紅次莊孟敬韻二首日暮誰令渉逺途此身天地一蘧廬清宵無夢追班馬白日何心校魯魚萬事已師齊物論一愁未有絶交書故人有意憐岑寂時致香醪為破除異鄉白首倦長途故里青山守敝廬北上慣㸔沙苑馬南行真食武昌魚陶翁晚嵗能無酒惠子平生賴有書白日閉門惟靜坐不教塵土到階除五言絶句次鄧伯言思歸詩韻三首萬里江南客思鄉無限情白頭誰作伴清夜讀書聲其二故鄉書不到歸鴈亦無情猶幸春來好曽無杜宇聲其三睡熟山窗白鄰雞殊有情為憐歸夢好報曉獨無聲題小畫衣雪掩柴扉漁舟艤釣磯開門聞犬吠知是故人歸題夢桂巻為舉人賦鈞天有宫名廣寒上有桂樹青團團剛風迥隔九萬里何人飛夢游其間乃是螢窗讀書客清夜神遊生羽翼手搴天上最髙枝來向人間占桂籍我聞昔賢曽夢松他日徴應十八公世間萬事有先兆精神交感潜相通人生出處有定分身外悠悠不須問致身富貴須流芳青史千年有公論袁氏族譜詩生民之初自古先林林棼棼天壤間後来作者有聖賢制為氏族分姻㜕猶慮後世昧本源復著譜牒存簡編袁氏之先何蟬嫣宣仲起家初氏轅固為博士經術專盎一名絲或氏爰不知何年定為袁邵公登用遘時艱垂紳正笏立朝端九重倚頼四海安魏晉而下亦有年代不乏人秉貞堅石頭忠節貫九泉九原不死愧禇淵恕巳殉唐尤可憐功在社稷垂不刋滋為唐相有圭田請立家廟嚴豆籩子孫似續遂綿延散居四方日以蕃鄞邑之族自宋遷近代復有玉堂仙奕葉業儒操槧鉛珙究六籍益覃研自惟受姓嵗二千譜牒散軼伊誰愆乃述所聞手自箋尚病簡畧弗克全我言禹功始濬川放諸四海乃滔天春秋書法得牽聯如彼𤓰瓞方綿綿枝牽蔓引相攀援後人繼承能勉旃一傳可至千百傳我作歌詩知其然子孫世守如真詮再次衍公約看杏花韻我生獨後邵康節白首黄塵走阡陌興來猶作山水㳺不减當年謝康樂歸來讀書茅屋底不悟庭中雨漂麥往年為客上湘水萬里不異僧行脚東還苕霅又十年日夜思歸嘆蕭索移舟五湖弔范蠡釃酒三髙祠太伯豈無蒼弁晴嵐翠亦有洞庭秋月白不問烏飛與兎走自樂鳶飛共魚躍去年買舟上吕梁横波利石森戈㦸狂吟不信風濤險浩飲祗恐滄溟窄眼中往往逢故人謾説人民己非昨去年二月到燕城官河水動氷初拆解裝孤館深閉門塵纓未暇滄浪濯城西招提雙杏樹聞道花開亦將落湯休妙語數見招憐我同是江南客嗟予卧病已旬浹出門不耐東風惡西家蹇驢許相借明日無風便如約政使飄零滿地香共拾殘英帶氷嚼追和東坡石炭詩韻奉簡衍公山氓鑿煤山脈斷負煤出穴胷抵骭荒山無人種禾黍百里舁煤入城換燕城居人十萬家家家燒煤勝燒炭土炕潛陽九地回寒谷凝陰一時散常年此物賤於土棄置道側無人看今年雪深頗艱得北風排户勁而悍閉門兀坐廣文氊經月不效嵇康鍛煩公為我致一車更借山中之欵段再次前韻述懐旦聞衍公積芻為盜竊取故未句及之我不學賤夫罔利登壟斷布衣雖敝聊掩骭又不能焚膏午夜坐窮經虚負流年暗中換北燕南越走萬里所至嗜好如氷炭故園松菊久荒蕪平生親舊雲萍散白頭締交廬山逺黄塵每埀青眼看天寒為我致烏薪剛陽可却頑隂悍側聞豪客夜相過乞取薪芻充冶鍛為問此客果誰與定知不是踰垣段衍公見和且有石炭之贈用韻奉謝君不聞百年木作溝中斷又不聞甯戚單衣適至骭一朝犧尊升廟堂布衣亦有軒裳換世間貴賤良靡常萬物變化猶銅炭我生不知行路難五十年來任蕭散白日無事常杜門青山每向墻頭看暮年南北倦奔走炎雲爍面朔風悍荷公贈我煤專車助我吟哦精錬鍛諒無報公青玉案感公意重錦繡段謝樓則中惠炭則中名庸四明人白頭萬里客幽燕丈席猶憐有舊氊客舍尋常饒積雪帝鄉迢遞邈非煙故人頻致烏薪贈豪室空餘獸炭燃昨夜西樓瞻斗柄椒花又喜頌新年次則中見贈韻海鶴東遊久未還青田芝老白雲寒前身己悟三生石大藥難逢九轉丹好景每從愁裏過鄉山長在夢中看百年身世真何物白首勞生未得安蘿石軒為樓則中賦海上鰲峯僅一拳緑蘿深䕶覆春煙風回影轉龍蛇動月落庭空虎豹眠己喜孤根蟠厚地曽聞五色補青天摩挲莫問前朝事適見移來五百年悼袁公安漕粟三韓萬里城回颿中夜颺風驚身捐魚腹孤忠苦命落鯨濤一羽輕報國己酬平日志事親不盡百年情承家喜有連枝在荆樹春來又發榮題扇面小景百尺樓臺十二䦨重重簾幕䕶春寒繁華過眼空陳跡留得春風畫裏看斜日池臺生晚涼緑荷萬㸃蘸波光因思五月西湖路畫舫紅雲十里香望魯我家西江言望東魯雲山邈悠道脩且阻睇白雲兮天未憺秋風兮延佇西江兮幽幽跂洙泗兮道阻且修愛而弗見兮我心悠悠道在天地兮何所非魯理㑹吾心兮靡間今古我心之存兮繄道之所尚絅齋集巻五
