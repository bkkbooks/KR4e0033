  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0033_WYG_003-1a, image: WYG1229/WYG1229-0615a.png}
body:
  text: 尚絅齊集卷三明童冀撰南行集五言古詩過洞庭嘗聞楚粵交積水之所匯我來當五月雨過百川㑹􅔿淪詎有底磅礴信無外日月互吞吐風雲時霮䨴夷夏斯界限江漢相襟帶吳檣與蜀柂飄忽風雨快平生獨往意頗覺空眼界孰云吞八九胸中不芥蒂行當登日觀一覽瀛海大夜雪簡王雪舟兒時不識愁見雪喜欲顛長大頗不喜所望在有年蹉跎齒髮暮况乃憂患煎一身去鄉國道里踰五千北風昨夜起積雪被南天故鄉美醽醁不到篷窗前頗聞王子猷夜泛湘江船豈無戴安道掩關方醉眠人事每如此逺客殊可憐七言古詩送胡琪之富陽琪永康邑人永康有花溪西北流入雙溪花溪水下雙溪遙遙百里西南馳北折蘭臯復東騖却繞金華山下路金華山色年年青年去年來相送迎我家金華山色裏與子共歡雙溪水去年送子作賢良握手一笑溪水傍今年我亦金陵去邂逅錢塘復相遇錢塘江上三日留送子又登江上舟富春南望未百里江流猶是雙溪水我今暫别行當還扁舟還過富春山好買江魚釀江酒同向春風開笑口百年歡樂能幾何一年春色成蹉跎明年子亦作歸計衡門待子重相過謁卞將軍祠五湖雲擾鏖中原五馬渡江江欲渾關中帝子已北狩洛下士族爭南奔新亭英雄相對泣國體艱危僅能立姑熟甫見欃槍沉歷陽又聞䝟貐入江左夷吾身退髙廊廟重臣劉與刁幼君母后等孤注元舅鼠伏先遁逃將軍精忠貫白日氣吞餘子前無敵身冒白刃如無人此身不知知有國二子從父身爭先父前子後同九泉當時豪傑誰不死一門忠孝今千年六朝往事隨流水將軍至今猶廟祀世間萬事等飄風只有忠孝傳無窮過安慶謁余忠宣公祠舒州城小如堵牆舒州城外皆戰場遺民千百多殘創官中况復無餱糧余公東來植綱常民心險固踰金湯開門四野煙塵黃青天白日騰虎狼公執忠義為鋒鋩追奔逐北如驅羊羣盜出沒猶披猖蜂屯蟻聚稱侯王孤城屹立當中央羽檄徵兵驚四方援師不至振復僵此身真與城俱亡舉室效節沉滄浪聲名日月齊輝光新朝褒忠勸貞良作廟秩祀嚴蒸嘗平原睢陽遙相望雲車風馬參翺翔我嘗拜公浙水傍繡衣玉節何煌煌今公遺像儼在堂九原不作涕四滂秋菊春蘭薦馨香嵗時奔走來巫陽江水日夜東流長遺民千古心弗忘過賈太傅廟遺址洛陽年少古希有誰其薦之河南守聲名一日傾京師漢廷無人出其右是時天下方治平朝廷柄用皆老成惟生新進談世事開口磊落令人驚流涕未已復太息絳灌諸人豈相嫉不愆不忘循舊章法令紛更果何益一官迢遞來長沙承恩又看梁園花寢薪書上痛時弊鵩鳥賦成悲日斜當時未識治安䇿宣室何勞問前席漢家禮樂興百年身後時方用儒術武皇鋭志追古先待詔金馬非才賢使生當時偶未死致治三代良非難我聞古人任黃耉大器由來晚成就舉世皆知非漢文惟我獨憐生不壽空山落日寒煙昏千年遺廟無復存荒庭古井久不食寒泉一勺㪺芳蓀我生已是千載後老去惟知懶開口致身富貴須少年獨立乾坤重搔首讀磨崖碑昔年髫稚頗好奇先達示我磨崖碑是時未識六書故豈知中有千古悲蹉跎塵世逾半百鏡中白髮看成絲朅來薄宦向南紀葉舟夜泊清湘湄道傍巨石屹千尺舟人指此為浯溪呼兒篝火徑登岸草樹䝉密無旁蹊回舟終夜四五起仰視清漢聽晨雞遲明攀援陟巘崿石磴仄足難階梯平生兩目久昏眊大字盈尺無由窺粵從少小偶誦億口占夢想心追惟乃知天寶全盛日宴安鴆毒鍾菑危華清十月車馬集漁陽一夕煙塵飛馬嵬倉皇六軍發靈武逼側千官隨俯從人望計良是不禀君命禮則非三綱蚤失開國日萬事寧論叔世時翠華東還果天意白首西內非人為閹豎竟一竊國柄牝雞幾再鳴宫闈向非奸黨自魚肉禍患正恐無時衰中興功名屬李郭致治政績慚臯䕫藩鎮侵尋事倔强朝廷姑息惟羈縻唐家由此訖不振百年禍亂基於斯邇來涉世六百載當時舊物無一遺髙崖峭壁亦消泐大字深刻生瘢胝古今幾人此游歷賦詠往往興歎咨豫章歌詩明大義廬陵作賦推事機人情天理兩曲盡嗟我欲詩難措辭江風東來飽帆腹舟人告我行路遲攝衣登舟亟就枕回首百里浮烟霏古來變故亦何限貽厥事業須良規周宣一去不可作三復常武車攻詩題梨園小畫君不聞昔年天寶全盛時梨園玉雪千萬枝君王夜入月宫去後庭愁損千蛾眉銀橋閣道相連屬十二䦨干倚寒玉歸來不憶天上游獨記霓裳羽衣曲沉香燕坐清夜長流蘇寶帶懸明璫一百五十寒食節三十六宫明月香阿環睡足嬌無力夢繞巫山楚雲碧六花散作晴雪飛落地瑶華曉無迹漁陽一夜飛邉塵六龍萬里天西巡馬嵬腸斷埋香玉蜀道天髙空白雲東歸坐歎年華暮遙夜漫漫誰與度梨園子弟生白頭滿眼新人不如故爾來此恨六百年花開嵗嵗春風前乾坤舊事逐流水畫圖却向人間傳半幅齊紈渺蕭瑟拭眼春風香霧濕當年畫史知幾人不為君王寫無逸題梅溪卷我昔雙溪溪上住手種梅花千萬樹門前流水橫小橋屋後青山更無數醉來放舟溪上流青山處處隨行舟十里春風落香雪一溪雲影如浮鷗年來作客向荆楚夢中猶記來時路披圖不省是他鄉徑欲拏舟便歸去溪光山色殊有情梅花夾路遙相迎南枝昨夜報春信歸去花前看月明送丹丘生兼簡金華士友吾聞赤城之東丹穴山上有珠樹青琅玕蒼麟白鹿共馴擾翩翩五彩停鳳鸞瀛洲圎嶠在咫尺瑶臺銀闕青雲間爾來人世竟寥絶青鳥久不來塵寰前年衡嶽竹多實鳳雛飛來栖石壇朱陵洞深海雲濕華蓋風髙秋月寒三閭廟古江蘺碧二女祠荒湘竹斑頗聞蓬萊水清淺刷羽夜渡滄江灣滄江東望接雲海霞城石壁髙㠝岏赤泉出穴味如醴瑶草青青冬亦蕃九苞綵羽久相遲碧梧翠竹交檀欒東歸幸謝赤松子千嵗𤣥裳當復還贈丹崖隱者吾聞零陵東有丹崖山青天削出青孱顔丹梯百文不可到仙人煉藥巢其間丹成仙去已千載至今草木餘清寒我來覽古訪陳迹石磴仄足難躋攀上有撑雲柱日之喬松下有懸崖噴壑之驚湍幽林野鳥作人語隂洞或有蛟龍蟠何人結屋倚蒼翠抱琴林下聽潺湲乃是丹崖仙人老孫子少年早脫名利關袛今五十如處子雙鬢鴉黑顔渥丹門前種秫釀春酒屋後黃獨供朝餐野猿有時來獻果木客賦詩常往還留我石上煮春茗松花落地雲斑斑我家金華五千里失身作客天南端徴書昨夜趣歸興葉舟徑下湘江灘𢎞文館深難置足神武門髙宜掛冠山中草屋幸無恙拂衣歸共浮雲閒明年花開倘相憶把酒北望興長嘆裁書欲寄無鴈過少待遼鶴東飛還水車行永州水車不假人力分送諸溝可以及逺數里之外其田亦仰此水云零陵水車風作輪緣江夜響盤空雲輪盤團團徑三丈水聲却在風輪上大江日夜東北流髙岸低岸開深溝輪盤引水入溝去分送髙田種禾黍盤盤自轉不用人年年秖用修車輪往年比屋搜軍伍全家載下西涼府十家無有三家存水車卧地多作薪荒田無人復愁旱極目黃茆接長坂年來兒長成丁夫旋開荒田納官租官租不闕足家食家食復藉水車力一車之力食十家十家不憚勤修車但願人常在家車在軸不愁禾黍秋不熟荒田行永州四野荒田彌望入全州境即無曠土矣永州荒田多宿草永州田多人苦少南村田荒無人耕北村草深人不行往年峒徭據城壁驅迫編户充軍役十户逮今無一存當時寧望長兒孫壯者隨軍入軍伍老者盡作泉下土少者僅存雖長成十家九户惟單丁應當門户倦奔走豈有餘力到農畝荒田積草如人長熟田近年亦拋荒男啼女號飯不足草根木實常充腹荒田幸免官徵科熟田徵科真奈何永民自嘆生來苦不信人間有樂土君不見隔岸即是全州山四時耕墾無時閒漁蕩行永州江清稀見魚永民嵗嵗輸魚租當年差官閘湖蕩尺水從兹起波浪江濵湖岸多沙洲一望不見天盡頭常時風色黃塵起一夜雨聲潢潦流丈量繩引計頃畝半抑編氓强分受黃綾大册書入官嵗嵗催糧煩甲首大家有田無宿舂小家寄食身為傭年年逋負遭箠楚儉嵗惟聞闕舟載糧輸入倉倉倉嵗額常虧糧君不聞道州魚課年年足當年閘課官不酷永州魚糧畝一斗道州才數升又無水泊之患民至今賴之五言近體江行客路四千里江行兩月程乾坤雙鬢改身世一舟輕事業慙先達聲名畏後生少年容易過寥落壯心驚七言丙辰立春日留錢塘鶴書嵗晚下岩扃千里迢迢去上京春事又從今日始月華猶是故鄉明愁來無復聞雞舞酒醒生憎聽鴈聲獨喜歸心似潮水夜來又過富陽城江上雨晴曉望老去情懷厭雨聲篷窗曉起坐新晴雲間一鶴從天下江上羣山照眼明身世悠悠渾是夢客鄉事事總關情白頭竟為徵書起深愧當年魯兩生觀盡忠池拜余忠宣公墓荒池斜日暝雲陰獨立空山淚滿襟遺老能言當日事寒泉猶照死時心百年妻子皆魚腹一代山河竟陸沉故國春風又芳草秪應遺恨九原深過黃州楚天雲淡雨初收江上南風五月秋勝槩幾年懷赤壁䆠遊今日過黃州乾坤故物青山在嵗月無情逝水流白首此身千里外登臨不盡古今愁登黃鶴樓城上髙樓接翠微樓前山水淨朝暉青山萬古應常在黃鶴千年未一歸兵火凄凉悲燐集雲霄突兀又翬飛登臨不用重嗟惑城郭人民幾是非登嶽陽樓片帆西泝大江流五月南風過嶽州吳楚尋常多巨浸東南形勝有斯樓百年共老人間世一代誰先天下憂顧我登髙尚能賦不堪重起望鄉愁寄武昌吳廣文二首大江東下鄂州城千里頻煩逺寄聲壯志每憐人易老異鄉猶喜月同明雲萍半世偶相遇膠漆十年無此情聞道歸來黃鶴語五湖曽許白鷗盟春風艤棹楚王城曽向蕭齊聽雨聲臨水忽驚頭併白看山誤喜眼猶明愁來無復軒裳夢老去難忘兒女情最憶故園春事動石田茅屋要尋盟次前韻簡衡陽王俊華廣文一首八詠樓前婺女城一年不聽早鶯聲登樓誤喜青山在覽鏡羞添白髮明故國春風頻入夢異鄉啼鳥最關情愁來更憶王文學何日東歸共結盟寄漢陽陳廣文水西門外西州路猶記津亭折栁枝鴻鴈一年無尺素江湖兩鬢各秋絲三湘地控巴人國八詠樓連婺女祠聞道日來頻在告莫因鄉土重懷思次前韻寄王廣文一冬不見衡陽使開遍梅花到北枝照眼山雲晴冉冉捲簾江雨曉絲絲青風落日三閭廟翠竹何年二女祠早晚湘江春水暖好憑雙鯉寄相思次前韻寄長沙李叔南孤舟一别李徵士飽聽三湘歌竹枝太白莫空尊裏月還丹難黑鏡中絲素王禮殿崇新構赤帝行宫有舊祠想見登臨足佳製綵毫日日寫幽思寄襄陽李仲訓廣文劉郎新自渚宫還每說襄陽李謫仙夜月醉傾千日酒春風爛寫五雲箋習家池上閒調馬漢女江邉誤喚船白首何由一傾蓋暮雲春樹思年年送楊明府從軍廣西蚤嵗棘闈曽射䇿轅門老去却談兵烏紗有恨黃塵滿青鏡無情白髮生半世春風蕉鹿夢孤舟暮雨竹雞聲家山萬里天西北猶喜長空共月明送張僉憲從軍栁州千古清風栁栁州謪官誰復得清游十年事業邯鄲枕半世風波舴艋舟鸞鳳有時棲枳棘貂蟬自昔出兜鍪白頭且遂從軍樂一任東陵說故侯送人還武昌湘口驛前江水流故人亭下送行舟五更山月不知曉一夏江風渾似秋無事取琴彈越調有時把酒看吳鈎片帆我亦東歸去早晚相期黃鶴樓謝王雪舟惠楮衾楮生家住剡溪濆每念無氊鄭廣文月夜久諳塵榻冷春風今向雪舟分玉堂天上無清夢茅屋山中有白雲見說梅花消息近好將心事問東君次前韻述懷倦客南游湘水濆故山猿鶴久移文半簮華髮催年暮一榻青氊坐夜分季子已無衣卒嵗相如徒有賦凌雲昨宵又作還家夢茅屋分明見少君對月有懷投老山林種秫田春風吹上楚江船鄉關一别四千里京國遙瞻尺五天宗武日來稀有字廣文客久更無氊多情賴是湘江月照我清光似舊年竹軒聞道君家軒子好髙情更借竹為名開門蒼雪灑衣濕當晝青雲滿眼生林下四時無日色枕邉六月有秋聲丁寧慎勿開三徑更有蕭蕭車馬鳴丁巳生旦有感獻歲髙堂奉壽巵白頭兩度客天涯百年父母劬勞日一嵗乾坤交泰時故國音書歸鴈寄異鄉心事落梅知斗杓又復回東北江水歸心日夜馳題松庵余伯恭江西人以醫寓居清湘余氏安居如斗大長松繞屋四時青雲根有時孕琥珀露氣滿山藏伏苓鶴踏仙花枝上落風傳天籟夢中聽清宵借我蒲團坐來讀黃庭內景經九日泊安慶城下危廣文餉酒走筆奉謝舒州城頭山可憐舒州城下水如烟一年客路又重九咫尺鄉山猶二千青眼故人殊念我白衣送酒可如泉定知後夜到京國兩地懷人江月圎五言絶句病起偶成一病又十日春歸了不知開門見芳草不省是何時題雲山小畫二首不到家山久茅簷長薜蘿最憐春雨後幽徑白雲多不踏鄉山路于今又幾年茅簷知不逺只在白雲邉題萬桂秋聲詩集露冷三秋月香清十里風都將春草夢吹入小山叢七言題翠竹紅梅瑪瑙坡前雪未消小樓翠袖倚嬌嬈醉中不省看圖畫行過西湖第六橋題杏花白頭公小畫曲江池上踏殘紅十載春風似夢中誤向花前聽啼鳥不知身是白頭公題畫古木漢室掄材構建章斧斤日日到山岡誰知寂寞滄江上猶有參天古木長題秋江小畫兩岸青山宿雨收西風木落洞庭秋若為得似游魚樂只恐煙波有釣舟題宋徽宗石榴髙宗書韓昌黎詩金風吹綻紫綃囊零落宣和御墨香猶喜稍頭風露少南枝有子殿秋光辭王穆字辭王生穆名厥父攸命長而加冠字以熙敬古人制字名實相須一有弗稱豈不厚誣惟人之生匪敬曷存一身主宰萬事木根穆之為義惟逺惟深外著乎貌內存乎心本末交修表裏一致勉而弗怠聖賢可至在昔大聖穆穆文王緝熙斯敬其道乃光吾儕小人唯恐失墜夙興夜寐罔敢逸豫洞洞屬屬執玉奉盈戰戰兢兢臨淵履氷如見大賔如承大祭念兹在兹終始弗替匪惟知之行之實難匪惟行之繼之惟難想彼川流不舍晝夜我月斯征我日斯邁勿謂敬止惟恐弗䖍勿謂繼止惟恐或愆朝斯夕斯克敬克繼曷以致之惟學為貴百爾君子各究爾忱我作字辭式配心針永庠三子字辭有序子生三日父命以名既冠而友字之禮也古者人之命名其别有五以民生為信以德命為義以類命為象取於物為假取於父為類義也永庠弟子員鄒生復秦生泰劉生升皆以易卦命名其殆德命之類乎三子亦既冠矣謁字于豫因字復曰孟陽字泰曰志同升曰允升復衍厥義為之辭曰民之初生知愚同類亦既有名盍思其義幼而弗學曰未有知既冠而字如何弗思古之君子以義制名匪惟名之實踐於行惟子之名本乎大易聖人垂訓循名責實復之為義惟陽始生字爾孟陽進德之亨天地相交其道為泰字爾志同終始罔悖地中生木進而上升信能積學乃克有成泰道尚同陽德無息升而不已胡學弗積百爾君子勉之敬之朝斯夕斯視我字辭說永庠三子字說豫攝教永庠之明年將復如京師弟子員唐政秦懋鄧良請於豫曰政等無似僻在逺方未嘗聞大人君子之餘論先生弗逺數千里幸不鄙夷而辱教之今先生遽舍去政等弗獲擔簦負笈以承聲咳深懼荒墜舊業以遺君子羞願賜一言而卒業焉豫告之曰若亦知夫為學之道乎夫學所以盡為人之道不假外求也詩不云乎天生蒸民有物有則民之秉彛好是懿德夫德者何人所稟於天之良心也良心之發則為善政誠勉之弗怠為學之道豈外是哉然人莫不有是心也而物欲蔽之存焉者寡孟子所謂操則存舍則亡者也茍操之弗謹放而不求心且弗存而况於為學乎因字良曰秉彛字政曰以德字懋曰士勉俾之循名顧義而勉學焉庶不負斯名矣雖然名者實之賔也有其名而無其實君子弗與也子其勉焉思其名以踐其實庶可以為學矣三子皆淳謹有志乎學故豫樂以是語之猶懼其或忘之也遂書以為三子字說銘拙齊銘邃古之世民俗熙熙巢居穴處泊乎無為粵自結繩爰逮書契風氣日開俗由以敝繢素為絢雕質以文是非雜揉真僞紏紛變故相凌譎詐相尚徐偃飾仁燕噲竊讓漢隂抱甕桔橰見嗤亦有吳客善用不龜機心日萌機械日盛射利抵巇以拙為病代有貞士究觀古初抱朴行素以拙為徒日出而作日入而息我蠶我衣我田我食人謂不足我則有餘人皆奔競我獨休居相彼世間物有萬類倚伏相尋利害攸繫謂鳩為拙乃居鵲巢蛛蝥信巧一身莫逃惟人之生真罔實僞抱拙終身庶其無愧有扁昭揭勿替厥名朝斯夕斯視我斯銘題跋跋所翁龍昔之善論畫者不于其形似視其筆意而已豫嘗見古人作畫規模略是而趣度閒逺蓋有出乎筆墨畦徑之外者後人徒泥其迹古意遂不可見此畫獨得古人筆意信其為所翁作無疑夫龍之為物神變不測尤不可以形迹拘而世謂張僧繇畫龍不欲㸃睛恐其飛去此所謂論畫以形似見與兒童鄰者可為一笑因閲此畫遂識其末尚絅齊集卷三
