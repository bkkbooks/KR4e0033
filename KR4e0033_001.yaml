  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0033_WYG_001-1a, image: WYG1229/WYG1229-0564c.png}
body:
  text: 尚絅齋集卷一明童冀撰金華集上五言古詩古詩十首弱齡抱髙尚雅志在丘園胡為坐維縶逼側城府間窮年守鉛槧嚴程如作官日晏甫朝食冬裘春不完達生貴適意詎敢求晏安永懷沮溺徒躬耕非所歎窮巷謝輪鞅寂寞如荒村閉門十日雨不知緑陰繁編簡久息意況復謀琴尊日晏倒衣起竟夕坐前軒孫生亦閉戶董子不窺園嗟我獨無為愧此嵗月奔端居淡無營窮巷守環堵食罷何所為臨池聽疏雨秋風入庭樹柯葉已非故人生無百年玄髮忽改素有酒且作樂勿為浮名誤宿雨霽清曉緑陰布庭隅開軒緬遙岑好鳥鳴相呼兹辰豈不佳攬衣步前除仰睇雲中鳶俯羡淵底魚物性各有適吾生諒何如空齋閴無事焚香坐清晨客至惟清談客去常杜門兹辰偶愜意駕言出城闉昔遊嵗未殫今來已徂春冉冉四序換種種雙鬢新盛年不重來俯仰愧古人豫章生道傍拱把尋斧斤樗櫟老空山百嵗長輪囷良材世所用蚤與憂患鄰惡木處散地乃得全其真出處慎所擇君子懼失身梧桐樹西掖濯濯青琅玕春風一披拂翠葉敷雲端髙枝集鳳鳥卑枝宿鵷鸞清秋下白露摧折同艾菅本非嵗寒質零落何所歎藝菊庭階下草盛菊不蕃物性各有時勿怨雨露偏嚴霜被蕭艾始見金英繁託形寓宇內榮悴非一端窮達安所遇庶以全吾天結髮業墳典志尚希古人區區守章句坎壈愧此身洙泗道已逺伊洛行復湮嵗月不我與五十恐無聞君子貴達道志士斯求仁天地大無外伊人處其中寸心具萬善上帝所降衷胡為汨利欲擾擾昧始終修名不早立甘與草木同聖賢亦何人令德埀無窮雜詩四首叔孫制朝儀髙論傾漢庭綿蕞習野外禮樂何由興東魯致諸儒兩生獨不行豈不達時變阿世非人情周公昔制作乃待治化成用舍固有命出處良不輕昔有漢陰叟抱甕日灌畦鑿隧入古井功寡力巳疲桔橰暫俯仰薄之乃不為區區叔世事有械皆危機斯人不可作吾將誰與歸翟公罷庭尉賔客如晨星一旦復拜官夾道相逢迎署門亦頗隘外物何重輕四序更代謝日月有虧盈天運且如此況復時世情原憲守環堵窮巷席為門賜也相衛歸結駟從華軒迂轡偶見過握手道殷勤窮達各有命貧病安足論君子貴行道毋為羞賤貧盛生詩盛生德茂者家世乃儒紳厥兄舍鉛槧吏牘期致身微文偶失憤密網無縱鱗逮繫岸獄中藁瘞荒江濆生時奉菽水升堂拜慈親泣血叩首路弗憚千里勤干戈猶在目道路蕃棘榛崎嶇霜霰途涉歷踰十旬間道負骨歸號慟驚四鄰先壟幸可祔差慰地下魂窮冬十二月積雪遍郊原上天忽敷祐列岫明朝暾窀穸甫安厝浩蕩風雪昏天人良不逺一念至理存我思天壤間手足惟弟昆周公稱上聖管蔡乃流言舜象本同生謀謨蓋都君前聖且不免況復後世人惟生詩禮家孝義耳所聞趙禮昔讓肥艱難賊推仁繆彤痛自撾諸婦感天倫淮南自貽戚斗粟悲漢文陳思詠豆萁魏帝傷同根喟彼叔世士相視越與秦死喪孰孔懷鬩牆誠寡恩我作盛生詩庶使薄俗敦吳貞媛詩有序吳貞媛者和之含山人年十五歸郡人王綱乙未春淮泗兵起媛與家人避地梅山兵卒至家人悉奔散媛獨與一老嫗逃匿獲免既而出求其姑及夫不獲即赴水死未幾綱之宗人克瑀戰沒于敵其婦阮亦不食而死嗟乎是何王氏之多貞婦也世衰道微大義不明求其如王氏婦者幾何人哉感歎不足繫之以詩貞哉王氏婦結髮從所天百年奉箕帚中道成棄捐白首會一死甘心即九泉婉婉桃李花隨時競春妍漂泊風雨中零落岐路間死者奚所憾永為生者憐效何水部一首看梅東閣上遙憶帝京時梁園雪未下華林春已歸香飄鳷鵲觀影落天淵池已傷白髮暮敢怨清光遲隴首成異域何用寄相知效隂常侍一首荆楚三年别巫峽千里遙彩鷁阻去棹烏鵲望仙橋山雲自含雨江水不成潮柳長誰共結花殘復易飄陽臺空作望暮暮還朝朝效李長吉一首次中孚韻白露下百草庭階隕紅蘭愁腸劇車輪夜夜相回環青燈照魚目夢向交河還枕冷珊瑚枝不知雙涕澘七言古詩宋徽宗秋林野雀君不聞虞廷盛時鳳來儀聖賢飭戒惟時幾又不聞商宗肜日雉雊鼎君臣遇災克修省古來理亂良靡常居安慮危邦乃昌我聞宣和全盛日廊廟懷安事遊逸三邊不動無煙塵四海徴求到花石紫宸退朝清晝間霜林好鳥聲間關乘間適意一揮灑豈意流落傳人間海上盟寒朔風急遼水經年斷消息青城月冷烏夜啼一枝莫遂鷦鷯棲嗟乎虞廷鳳商鼎雉千載何人知此意日落梁園鳥雀悲龍沙或冇清夢歸跋文丞相遺墨有序右宋丞相信國文公手筆公平生大節不待人言也論者或疑公留燕所以久不死者豫謂公志蓋有在也夫一成之田一旅之衆安知其不有如少康者志則不遂意可悲矣感歎不足繫之以詩有宋科第三百年季年得士惟文山文山一身能許國精忠日月行中天我觀德祐顛沛日國勢駛若東逝川又如膏肓久沉綿雖有和扁無由痊公時崛起嶺海壖手執忠義為戈鋋疲氓弱卒不滿千壯氣直欲吞全燕倉卒一跌振復顛鷙鳥嬰網寧髙騫大酋箕踞叱使前膝不可屈身可捐敵國均禮古所傳驕氣竟折忠義言渡淮粒食不下咽天意未許為癯仙白馬係組軹道邊碙川崖山復顛連此身悔不東海填燕獄甘心坐拘攣四閲寒暑相推遷少康不作志莫宣賫恨白日埋九泉我嘗讀公吟嘯編三復遺墨涕泗漣古人逝去如雲煙公死不朽奚憾焉劉氏二子詩有序癸卯秋盜掠烏傷縶劉璹責其窖金不得將殺之二子抱父身扞之數創不釋盜義而免之因為賦詩以勸為人子者君不聞卞壼二子真孝子以身殉父從父死又不聞劉璹二子家被兵以身扞父同父生一生一死幸不幸同博千秋萬古名身亦何所有子職所當為獨憐彼寇心天理曽不虧嗚呼人心天理曽不虧毁常敗俗夫何為方壺道人山水歌吾聞瀛海中有方壺山瓊臺銀闕非人寰秦皇漢武不可到何人醉夢逰其間乃是龍虎山中學仙子十年辟穀餐芝髓青天白日無羽翰肉重骨凡飛不起雲濤浩渺煙蒼茫海天萬里遙相望神交意會忽有得身外萬事俱亡羊歸來醉吸三斗墨淨洗胸中舊荆棘解衣盤礴反閉關日對雲林寫蕭瑟爾來得名三十春眼髙四海空無人殘繒斷楮落人世夜光明月作竒珍君不見樂善堂中三尺紙開眼應須論萬里自言曽是揮灑時颯颯風煙生筆底祗今此境絶代無却向君家看畫圖平生三島惜未到拭目始見真方壺方壺之山果何處咫尺波濤隔煙霧欲從坡老借飛車釣竿一拂珊瑚樹方壺𨽻書張伸舉承旨海上所寄長律見貽因次其韻古人製車觀轉蓬學劒偶得白猿翁孰知犧卦本心畫不待龍圖出貝宫人言造字始倉頡我意定禮由姬公乾坤玄象煥昭晰渾沌白晝開溟濛川流山峙儼髙下日升月沒恆西東自然書法良亦顯何物世俗拘未通紛紛墨池疲嵗月往往白髮猶兒童長安髙僧筆成塜北邙大官碑作叢斯冰以來少正體曹鄶而下多變風嘔心苦購墓中物刮目未覩吳下蒙鈎摹點勒事剽竊毫分縷析論拙工仲尼陽虎貌則似叔敖優孟行不同岐山周鼓昧真贋泗水夏鼎迷始終岣嶁雲深宵露濕嶧陽火烈寒煙空鴻都石經變愈下苦縣棗刻肥失中壺也獨出超萬彚鳳兮一鳴瘖百蟲胸中況復有丘壑物外久已無樊籠蹇豫涉世遘多難學道勞生詎有功一卧山林秋草緑十年湖海戰塵紅從公千里訪真訣守雌畢竟誰知雄五言近體送人之金陵六代繁華地東南第一州此身雖未到清夢已先遊月淡烏衣巷天青白鷺洲何時一樽酒同看大江流逰智老寺次韻上方人不到嵐氣曉氤氲鳥道初無路僧居半是雲青山空色相流水悟聲聞擾擾紅塵客疇能為解紛題吳節婦詩卷四海歸無地一身從所天白頭終一死青史可千年素節冰霜凜髙名日月懸紛紛圭組客泯沒欲誰憐題小畫效王摩詰春來常早起幽事靜中多采藥行林影看雲坐澗阿柴門依水竹茅屋帶煙蘿却憶隨朝者嚴城散曉珂海上用兵次蕭申之韻五首帶甲連三郡投鞭海可梁人心異秦越天險謾金湯火烈牙檣遁星馳羽檄忙春風桃李夜誰復念流亡轉餉踰千里屯兵費萬金龍驤頻失利魚腹半幽沉地勢無夷險人材有古今凄涼江漢詠貔虎謾如林西風吹瘴海一炬烈戈船重耳袪猶在相如璧幸全衣冠爭鼠伏爵位半蟬聯不愧何忠肅臨危更乞憐干戈寧海嶠烽火復徐方有詔徴司馬無書論樂羊人間徴布縷閫外任膏粱矯首天西望煙雲正渺茫天網開三面民生亦少瘳釜魚方假息柙虎尚遺憂海曲聞休戍淮南會寢謀伏波何見晚甘作賈胡留送王宰逰上清宫少日栖東白聞風憶上清蹉跎成異域蹭蹬隔修程宇宙干戈滿風塵嵗月更故人千里别回首百年情春水江如縠仙岩石作枰淡煙汀草合細雨岸花輕葉縣初飛舄緱山舊聽笙張公仙去逺漢代迹難評玉局懸崖隱金沙布地行山川稱福地臺殿象曽城劒氣衝霄逈丹光入夜明青冥仍羽駕白日降霓旌瑶草淩寒碧琪花粲晚晴雲屏迎曙色月館送秋聲松徑慿猿掃芝田遣鹿耕夕行馴虎豹夜久嘯鼯鼪塵鞅何年稅菟裘此地營艱難時事改寥落壯心驚華構殘烽火髙原化棘荆登臨非舊迹俯仰歎浮生世路猶多梗關河未息兵匡時徒有志學道竟無成青鏡慚勳業黃塵謝利名桃源如可問嵗晚定深盟即事次李本存少府韻鏡裏功名白髮新青衫猶復困黃塵十年厭聽雙溪雨一䇿相依萬里身老覺有情皆夢境窮將無愧事心神莫言未卜歸何日在處青山許隱淪論交久歎白頭新況復關河有戰塵道在乾坤非外物人生疾痛舉吾身青燈永夜泣山鬼玄牝何年養谷神慎勿乘風破髙浪世間陸海正淵淪姚宋亡來事事新一丘聊復避紅塵勞生未悟夢中夢舉世皆憂身外身夜月推敲煩木客春風剪刻藉花神年來了絶功名念獨未忘情向隱淪蚤年學業尚竒新半世蹉跎混世塵嵗月無端誠誤我文章何物解榮身愁能俟隙工為祟詩到窮人謾有神猶幸他年光𦦨在不隨塵土遽湮淪次本存客居感時韻二首西江水落卧流槎華屋無人燕作家萬里從軍工草檄十年為客負梅花人情蜀道九折坂世事黃臺三摘瓜剩把年光付流水公私不必問鳴蛙小齋枕水繫流槎老屋栖雲近釣家半榻夕陽間貝葉一庭春色淨苔花勞生何異蟻旋磨閲世遽如蠅集瓜昨夜故山垂入夢一窗白月正鳴蛙次韋德希思歸韻韋京口人丁亥春來金華遂不克歸韋郎五字繼蘇州妙句難將尺璧酬幾度春風貧裏過十年鄉國夢中逰少陵劒外猶漂泊太史周南久滯留聞道王師方轉戰五湖何日遂歸舟次德希感時韻二首轅門月射劒光流愁聽量沙夜唱籌黃屋宵衣嚴待旦黑山戍卒罷防秋邊方蜂蠆輕中國江漢金湯重上遊閫外尋常務持重濟河誰復念焚舟寢薪未覺涕先流銷印無從借箸籌臺閣望隆中執法宫闈政仰大長秋乘輿北幸嚴時狩帶甲東征盡貴遊何日皇威清海岱五湖能復逐扁舟次前韻寄赤松觀陳一山錬師濯纓亭下羽觴流曽折瑶華計酒籌白日蹉跎三島暮紅塵俯仰十年秋愁來莫問丹砂訣醉裏聊同造物遊近日桃源足輪鞅洞前寧復有漁舟濯纓亭小桃源皆山中之勝地送孫架閣掾淮南省二月江南芳草青送君此行空復情掾曹頗勝州縣職男兒須勒彞鼎銘襟懷無愧范孟博姓名似是孫子荆落日重城莫廽首長淮吹浪東風腥詩會分韻得慈恩寺塔層梯直上幾百尺獨立中天數暮鴻萬里關河歸眼底一聲笑語落雲中昭陵無樹聽秋雨泰華連山走下風落日闌干莫回首天樞突兀五雲東送王子充潘生之金陵兼簡楊宗敏故人八月下金陵秋水揚帆似建瓴王掾有才頭最黑潘郎多病髮猶青西風燕去烏衣巷落日人歸白下亭聞道揚雄頻在告閉門定草太玄經送翁仲彬回金陵月明江上棹歌間倦客東遊未賜環千里鄉關非白下十年書劒逐黃間水生建業魚初上春早衡陽鴈未還莫向鳳凰臺上望楚雲盡處是君山送王令逰上清宫張公昔日棲真地飛舄何年出尚方宇宙風塵三島外神仙樓閣五雲鄉山空丹氣成龍虎月冷簫聲下鳯凰賸欲從君尋舊約石壇瑶草漸應長題畫唐馬翠華十月幸驪山鳳臆龍鬐出帝間玉殿曉陪天仗立霓旌夜向月宫還漁陽落日邊聲急蜀道連雲國步難拭目風塵重搔首丹青蕭瑟鬢成班送金中孚赴藩閫辟腰下吳鈎照日明壺中春酒緑如澠也知孫楚參軍舊自愛陳琳草檄能玉帳搜兵春會獵轅門留客夜張燈少年蚤識從軍樂莫信詞章動茂陵寄金中孚時新城大捷嚴城旌斾拂招搖大野烽煙一戰消塞上新歸宛騕裊軍中獨數漢嫖姚天間恩錫五花馬記室家傳七葉貂共説陳琳工草檄可能有意向漁樵寄宋景濓太史太史東歸未賜環菟裘營就白雲間九重一夜思前廣丹陛經年輟近班視草玉堂登要地紬書金匱記名山頗聞尚抱煙霞疾天上蓬萊足燕間送友人進表次韻蘭臺又見上封章雞舌曽頒漢署香一夜星辰經御覽九秋宫殿動髙涼中朝典禮藏金匱上界仙人直玉堂白髮詞臣猶奉使故園松菊老柴桑題竹隱卷句曲仙人舊隱居門前種竹翠扶踈髙人已作遊仙夢諸子猶能讀父書孝感定應冬有筍間居可是食無魚最憐好事殊庸俗千里徴詩到草廬次金中孚韻寄陳一山鍊師六首聞道樓居山色近白雲只在屋簷栖舊栽黃獨如拳大新種蒼松與屋齊桂楫每隨波上下草堂恰似瀼東西太玄近日渾慵覽上有去年春燕泥有客苦吟生白髮常時得句似黃初牧羊舊識左元放瘞鶴近臨陶隱居石田嵗晚惟收秫野水秋深堪種魚莫信文成能玩世飯牛虛寫腹中書枕流亭下青山近過雨嵐光照碧窗宇宙黃塵清氣少江湖秋水白鷗雙山中有客如孫楚牀下何人拜老龐猶喜山田多種秫西成看釀酒盈缸我識菌巢陳外史辟穀幾年餐日華燒丹每説勾漏令妙墨能追蔡少霞案上隂符書柿葉牀頭春甕釀梅花也知别有滄洲趣臨水時時繫釣槎山中有閣臨水曰滄洲趣東海揚塵又幾年神山無地可求仙夢回禹穴勾無洞身在仇池小有天幾處丘原存馬鬛誰家圭組尚蟬聯山中幸有桃源近試買扁舟學弄泉蓬萊髙閣枕秋水開窗正與碧山齊海東有信傳青鳥天上無書降紫泥藥熟桐君時按譜詩成木客夜分題醉來尚憶雲房宿幾看闌干北斗低再次韻酬中孚時新卜築優遊洞中徴君久客厭城府年來旋買碧山栖牆頭薜荔秋陰合屋角篔簹雲影齊人言遺逸似柳下我憶畫圖如竹西有約明年定相過杖藜隨處踏春泥故人歸隱優遊洞對客清談似泰初舊栽露果猿能摘新構雲巢鶴共居市上三人傳有虎山中一月食無魚漢庭當有公車召莫學虞卿窮著書諸公衮衮登西掖有客悠悠卧北窗當代人才殊不乏如君國士諒難雙風流江左聞諸謝耆舊襄陽憶老龐見説山齋新釀熟瓦盆能共倒秋缸黃金不解化丹砂青鏡時能點鬢華舊讀春秋演繁露近餐日月咽晨霞硬黃小字臨章草太白深杯對菊花好約安期羡門子秋風海上覔星槎懶從唐舉問流年且服黃精學散仙海上何人來看日山中有客去朝天碧窗夜雨琪花落金殿晨班玉筍聯最憶蓬萊潘閣老白雲無夢到松泉碧山學道幽居好新種篔簹繞屋齊客至時時尊有酒春來日日醉如泥但須百斛斟雲液不用千金買月題却笑山公騎欵段秋風搖曳玉山低三次韻奉簡太史宋先生憶昔公車徴待詔束書嵗晚起岩栖蓬萊望日三山近閶闔倚雲雙闕齊當寧每承宣室問退朝多在掖垣西山林此日惟髙枕疇念彤庭拜紫泥蚤嵗能文賦子虛挂冠甫見二毛初久依丹地朝王所恆憶鈞天夢帝居紫禁九關嚴虎豹青山一榻注蟲魚漢家天祿新雲構劉向能忘舊校書一舸秋風下大江歸來寄傲倚南窗平生諾重黃金百有子才如白玉雙進善舊師羊舌赤退耕近學鹿門龐山田見説秋多秫雲液懸知釀滿缸太史在官多病久幾年簮筆侍金華上嘗賜告踰三月內錫黃封醖九霞退直不言溫室樹歸休每憶上林花雲山未覺青宵逺星漢遙連海上槎帝鄉一别又經年却向丹丘訪羽仙閶闔五雲丹鳳闕江湖春水白鷗天儒林接武登羣彥官署𢎞文易舊聯頗念草玄揚執戟白頭能復賦甘泉時楊宗敏尚留京東華曉漏聽朝雞幾見彤庭簇仗齊一夜榻前催草詔九重天上降芝泥拜官西掖承殊渥䇿士南宫憶舊題此日江湖殊戀闕蓬萊北望五雲低次鄧作霖韻三首名士龍湖山人傾蓋相逢見素心别來夢隔楚雲陰不慚下里巴人曲幾和南陽梁甫吟鴻雁書回千里逺魚龍水落大江深雙溪此夕知何夕邂逅官曹又盍簮時作霖置酒溪南官舍會金華士友十日春無一日晴可堪折柳送君行遙知客舍聞雞舞尚憶賔興賦鹿鳴戀闕幾形青瑣夢還家共羡錦衣榮少陵老去孤忠在定有新詩紀北征故山親舍白雲間嵗晚移舟楚水灣一棹清風唯載月孤篷落日更看山雪晴五老明雙鬢煙淡小孤深翠鬟詎羡還家榮晝錦髙堂自有綵衣斑再次前韻贈别一第功名負壯心先鳴寧復記平陰乾坤又見朝周正湖海誰憐尚越吟兵火十年雙鬢改家山千里暮雲深漢庭未信馮唐老青鏡侵尋雪滿簮馳道塵香宿雨晴故人春早帝京行雪消上苑林鶯語日上髙岡有鳳鳴宣室已聞召賈誼輜車會見錫桓榮四方玉帛皆廷貢不日王師罷逺征舊識匡廬罨畫間艤舟幾夢落星灣卜居未遂東西瀼招隱空懷大小山四海風塵求駿足十年林壑閟煙鬟若為得似南山豹霧雨何曽露一斑次彥德廣文元夕詩韻八首前四首奉廣文後四首簡潘叔文别駕八詠溪山舊倚闌十年湖海客氊寒重來已悟三生夢老去難逢一笑歡草酌春風浮蟻釀花瓷香露瀹龍團醉歸一夜梅飛雪愁絶江城畫角殘廣文壬辰寓郡庠别去十載復會于此倚遍南樓十二闌中天月白劒光寒六朝往事空陳迹百嵗相逢且盡歡汗馬功名輕草檄雕蟲事業付蒲團山林鐘鼎何須計人世黃粱夢未殘小雨苔花滿石闌東風簾幕晚生寒青雲負我平生志白首懷君舊日歡槐市夜歸燈影亂梅簷花落粉香團祗今寂寞山窗下一榻松明耿夜殘玉版烏絲界小闌銀鈎光照墨花寒西堂夢草留佳句北闕傳柑詫合歡雲屋醉歸花氣暖月階坐久樹陰團挑燈又復翻青史衛霍功名半紙殘節物驚心怕倚闌家山千里暮雲寒桑田俯仰人間世菽水團欒夢裏歡衡石事嚴宵漏盡博山香暖瑞煙團故人今日皆天上還有雙魚寄膾殘潘公姑熟人由相府博士仕兹郡子童甫本郡文學緑窗睡起怯憑闌小立東風敵晚寒一笑尊前殊邂逅百年身外幾悲歡淡雲螺岫橫天末落日鷗波點雪團何事休文尚詩瘦鏡中華髮易雕殘北望神州倦倚闌帝城三五尚餘寒玉堂夜直追殘夢金谷春逰憶舊歡綵仗鳴騶驕馬過絳紗籠燭舞蛾團山城此夕渾愁絶獨對青燈待漏殘小樓醉起怕危闌豪傑當年骨已寒漢武虛聞召徐樂宇文肯復識髙歡草荒陋巷車無迹花滿征袍錦作團昨夜壯遊還入夢蒼龍觀闕月初殘正月十三日飲潘茂清家廣文詩附于此會稽人燕寢香凝畫角闌滿庭月色不勝寒申辰我愧同年小元夕君先此夜歡醉後傳柑黃玉皺尊前擘蟹紫膏團却憐杜老嚴公幕獨宿江城蠟炬殘次彥德廣文遷居韻二首十年烽火照吳中環堵空懷一畝宫客舍驚烏翻夜月宦途飛鷁退天風梁園賔客餘枚叟楚國衣冠老白公昨夜壯遊還入夢東華日逐軟塵紅蚤嵗論文陋管中䇿名曽擬薦南宫雕蟲信巧徒淹日畫虎無成笑捕風待詔遠慚金馬客學書翻愧白猿公夜窗誤聽雞聲舞三尺龍光繞殿紅次前韻簡用和郎中燕寢香凝畫省中日長鈴閣靜齋宫上台躔度聯卿月南國衣冠盛士風諸將䇿勳書太史四方馳捷奏膚公陋儒擬製河清頌夢筆生花夜吐紅大江一帶限天中千古繁華六代宫虎踞龍蟠鍾王氣天荒地老幾秋風百年周禮存中國九命桓圭錫上公聞道水犀嚴大閲革車千乘薄搜紅次蘇平仲編修北山記遊韻二十四首上方臺殿倚新晴曽憶當年此地行松籟半天驚雨過竹窗中夜聽泉鳴黃金未煉丹砂就青鏡先催白髮生欲訪舊遊還自笑故山猿鶴肯相迎梯航重譯會京都喜見皇風冒海隅郟鄏萬年新定鼎玉關千里罷飛芻匡時有志隨羣彥學道無成惜壯圗已遂鷦鷯一枝願春風寧羡上林烏丞相祠堂一徑深百年宰木尚陰陰朝端又見新黃閣天上長懸舊羽林祖逖中原應有恨孔明梁父謾長吟神州在望空回首落日青山淡暮岑王丞相淮墓在山麓桃花源洞石梁低間有漁郎此路迷白鶴歸來作人語蒼松種久與雲齊水深夜壑藏金室雨過春泥印虎蹄共説前岡更幽絶誰能結屋事巖栖曉入禪關千里深上方髙處訪叢林行穿蘿磴雲生屐笑拂松花露滿襟華表鶴歸千里久靈湫龍蟄半巖陰亂離學道嗟遲暮頭白侵尋負壯心新築茅堂江水東開軒日日看晴峰百年世事如蓬轉三月春光似酒濃乍可前川間問栁誰能絶壑暮餐松北窗睡起聞啼鳥差勝東華聽曉鐘矯首鍾山淡暮煙帝鄉一别又經年玉堂夜直如天上丹地春來夢日邊西掖故人應好在北窗無事且髙眠興來忽憶參寥約杖䇿同參玉版禪空山茅屋掩柴門獨鶴歸來自不羣有客日邊同步武何人林下更移丈石田黃獨荒春雨澗壑蒼松起暮雲便好深居絶還往世間黜陟不須聞神仙樓閣倚晴空髙下軒窗面面通萬疊好山如畫裏一聲長嘯落雲中海天未返乘槎客洞口常逢采藥翁欲訪蓬萊仙路杳無由縮地似壺公清朝鵷鷺日相陪却伴空山獨鶴回三月春風辭絳闕百年姓字在丹臺天空霓節雲間下日落星槎海上來聞道蓬萊又清淺三山東望好浮杯紫皇宫殿枕巖幽星斗闌干在上頭玉局懸崖稱福地青山繞屋似羅浮雲間瀑布千年落洞口丹光白日流浮世黃塵方眯目秪應吾道付滄洲精藍結構自前朝金地莊嚴映綺寮臺殿四時常五色觚稜初日絢重霄黃龍聽法空山靜白馬馱經故國遙尚憶禪房曽借榻松聲午夜撼江潮北窗睡起正無聊日轉間階樹影交恰恰一鶯啼午夢飛飛雙燕定新巢丹青佛寺藏山崦白壁人家傍水坳隨分春風且行樂青雲得意莫相嘲枕流亭子碧山圍石澗橋危過客稀流水落花春自老濕雲栖樹晚猶飛山人和露收松子木客臨池製芰衣欲向丹崖同采藥黃精雨後漸應肥浣花溪上築茅堂好客過從只漫郎白露飛來汀草碧鱖魚初上柳花香放舟日日釣春雨按劒時時惜夜光好罷絲綸間袖手世間陸海事茫茫嘉遁幽人在澗阿飯牛中夜獨商歌光風霽月時時有野水間雲處處多屋外好山渾似畫門前芳草漸成窩人生得意須行樂百嵗光陰能幾何小池春水漲微瀾把酒臨風且盡歡三月韶光付流水百年心事幾憑闌勞生已信儒冠誤閲世方知蜀道難得失由來會天定雨雲翻覆謾多端故人天上輟朝班日向雲林載酒還閶闔九重天帝所蓬萊方丈道家山一年春色二分過百嵗浮生幾日間頗怪滄洲陳逸士抗塵時復到人間金陵雙闕屹岧嶤臺殿參差上九霄閶闔五雲浮王氣石城午夜撼江潮中華文物衣冠盛上苑春風鶯燕嬌四海梯航效庭貢信知干羽格三苗金華山下舊松扄曽讀黃庭究始青丹壑有時仍羽駕青霄白日降雲軿千年福地人間少九奏鈞天夢裏聽太史周南尚留滯何時扈從禪云亭丹砂未就二毛新却向名山訪異人庭下樵夫訝种放山中羽客似吳筠看雲日日浮松釀臨水時時正葛巾欲向桃源營草閣故人還許卜比鄰少日論文似馬遷要將勳業勒燕然青雲無力追才彥黃卷窮年對聖賢老去肯為題柱客時來懼作出山泉東風昨夜吹芳草又見西樓斗柄旋謾説桃源别有天人間無地息塵緣黃粱未覺三生夢白日難謀一醉眠浮世秪今方尚白故人何日共談玄山林已遂幽栖志底用燒丹更學仙十日春無一日晴興來騎馬出江城隔林黃鳥間關語夾道青山次第迎流水落花春自老虛堂夢草夜偏清明朝又作紅塵客慚愧浮雲去就輕次平仲酬唐宗魯侍郎韻二首粉署凝香畫省中歸來一笑大江空客星躔度連卿月王國衣冠盛士風玉帛四夷重譯貢車書一統萬方同東華門外塵如海尚憶天街踏軟紅十載懷人寄夢中愁來咄咄謾書空黃塵有恨非今日白首論心見古風市道交情多雨散士林髙論亦雷同嵗寒自昔期松柏莫學春花旦暮紅追和子昂學士鄂王墳韻二龍絶漠竟流離五馬浮江勢尚危北上忠臣生白髮東南興運止黃旗新亭誰灑中原淚大厦良非一木支落日湖光明埤堄鳳簫遙應角聲悲五言絶句題春郊曉牧圗頻年事征戍父子各關山得似春郊外吳犍帶犢還犍屈韻云似豹人首一目此作牛當再考題太乙蓮舟畫一葉杭天風萬里秋雲逺慎勿向三山蓬萊近清淺題古木寒禽野雀下庭柯裴徊弄清影豈無上林枝愛此山月冷題扇面小景天開虛白寒露滴空翠冷誰持明月光鑑此山河影題淵明小像采菊東籬下南山入望時葛巾新燒酒正耐晚風吹題太白小像不到長安久帝鄉風月間面餘山水色知是夜郎還題墨梅三首索笑山窗下霜清月在簷平生青白眼今始識無鹽幾年東洛客衣袖滿緇塵面色有深墨知非肉食人昏昏俱守默皎皎欲誰憐詎意林和靖年來亦尚玄題紅梅三首玉骨換丹砂夜雪迷春色欲學綵雲飛東風苦無力月殿春風早瑶姬試晚粧為憐闕霓裳流水小橋西東風路欲迷漁郎莫回首不是武陵溪題墨梅二首嵗晚湖山曲風塵到玉林定知梅處士移貌不移心莊子觀虛白揚雄守太玄無鹽與姑射不必問媸妍題小畫喬林出華構落日幾憑闌十載干戈後傷心畫裏看題白公小畫二首伐木空山裏停雲憶故人山人莫啁哳愧爾白頭新世路荆榛滿青山塵土深何知兩幽鳥頭白老山林題鈎勒竹四首月淡秋隂薄庭空夜色寒西風剪雲母片片墮琅玕漢女挾湘妃霓旌導羽衣夜深風露下却跨白鸞歸野鶴弄清影徘徊臨曲池離離霜羽短不奈曉風吹世路蕃荆榛抗節風塵底秉兹貞白心嵗寒奉君子題秋江送别圖江上西風急維舟待曉行前山新月上正是晚潮生次韻題梅花南枝春信早倦客鬢痕深嵗晚空江曲相看只素心題宋道君雞冠花黃雀各一首絳幘秋風裏青城夜月中君王有先見應寫鴈來紅艮嶽春風暖飛鳴意自間寧知他日恨却在紇干山題扇面小畫煙凝丹嶂晚木落鏡天秋可惜清宵月無人共倚樓題睡鳬夜月沙如雪春江水似天煙波幽夢逺不到鳳池邊舊日柴桑里黃花白髮新誤為彭澤令贏得滿衣塵栗里秋香晚東籬菊未黃翛然山月下忽見黑衣郎九日濁醪盡黃花笑酒杯夜深山月黑不見白衣來白髮陶彭澤東籬立晚風寧能效王掾早作黑頭公彭澤休容後西風滿面塵故交零落盡誰是素心人又題墨菊二首采采東籬菊秋香正滿庭定知陶靖節不讀太玄經東籬秋色晚白髮對斜暉獨怪休官後猶紆墨綬歸次胡仲申先生齋居述懷韻十首兼簡宋景濓先生晚來新雨過忽憶枕邊書睡起推窗看茅簷月上初相逢三島客東海又滄田不記遼東鶴歸來近幾年一春常苦雨晴意晚方佳坐看庭前蟻成行上古槐寒食多風雨年年苦欠晴凄涼麥盂飯不到北邙塋平生胡伯始曽是漢庭人老去長為客儒冠果誤身亂後追逰簡難逢一笑歡青春眼前過白髮鏡中看故人時見過有酒即須留但得時時醉百錢餘杖頭每憶宋夫子終年坐北軒著書良自苦得意好忘言勞生將半世志不在功名欲效菟裘計黃金苦未成金華山下路吾亦愛吾廬終嵗無車轍階前草不鋤次前韻奉簡范景先先生隂陽一太極羲畫本無書欲究先天意應思未畫初種學須時習工夫似力田終身似穮蓘不必問豐年奕世衣冠盛應須子弟佳如何王相國辛苦樹三槐寒食好天氣東郊踏晚晴去年金碗出今日有新塋紫陌多芳草年年閲世人空懷百年慮誰是百年身亂後居城府青山每見留晚來新雨過秀色滿牆頭浮生何荏苒百嵗幾悲歡留得修名在從教後代看二月山城暖春風到小軒茅簷喧燕雀桃李自無言陋巷無車馬幽居好避名不因書帶草誰識鄭康成南山青繞屋秀色似匡廬好買山中地春來共把鋤題梅花卷寄潘學士雪後逍遙谷春風近玉堂定應承雨露白髮對清光六言題雲松山房二首天上豹關九重海中鰲抃三峰用我玉堂金馬不用間雲野松泰山僅膚寸合徂徠已千尺強或用汝作霖雨慎勿傾人棟梁七言題子猷訪戴圗晉室頺波已橫流濟川功業謾悠悠渡江一楫無人畫却寫山陰雪夜舟題畫唐馬次韻泥融輦路雪初乾蹀躞霜啼散曉寒十載華清春夢覺風塵今向畫圗看小逰仙四首次金中孚韻秦女吹簫月冷瑶臺語鳳凰紫簫悽斷白雲鄉西風回首山河異鳷鵲樓開漢未央漢武招仙建章宫殿土花鮮仙掌亭亭曉露前沆瀣未晞松月墮桐人已迫茂陵阡劉阮天台桃花流水舊天台萬丈紅塵眯不開見説白雲天路逺當年劉阮若為來芙蓉城仙三生應誤讀黃庭謫向人間老月明欲躡鳳翎尋舊夢剛風秋隔五雲城冬日道中日落踈林度小橋天寒嵗晚路迢遙道人已是歸心急更為梅花住一宵題鈎勒竹二首為程將軍賦白旄風急秋陰薄玉帳雲深夜色寒飲散轅門天似水一庭霜月在琅玕玉帳屯兵渭水湄瓊林錫宴夜歸遲四山蒼翠秋無影月浸中天白羽旗山行一䇿秋江萬籟鳴白雲堆裏扣禪扄歸來兩耳松風在留得秋濤入夢聽題墨梅一枝欲寄隴頭思春早江南鴈到遲月黑小樓清夜永紫簫吹斷玉參差題扇面小景二首月殿笙簫十二樓霓裳按徹小涼州西風吹斷鈞天夢香老琪花幾度秋玉鈎半榻水晶簾金鴨餘香晚倦添睡熟紗厨天似水緑荷涼月夜厭厭尚絅齋集卷一
