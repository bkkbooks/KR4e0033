body:
  text: 尚絅齊集别集類五明提要臣等謹案尚絅齊集五卷明童冀撰冀字中州金華人生于元末洪武丙辰被徵入書館後為湖州府教授調北平坐罪卒此集不知何人所編分詩文為二集體例雜糅殆不可讀就其編目考之原目當為金華集南行集霅川集北游集四種前三集兼載詩文惟北游集有詩無文後人不知古法以詩歸詩以文歸文分為二集而詩文之中又不各歸其類前後復叠職此之由幸其雖經割裂尚未竄亂猶有端緒可尋今詳考標題仍分為四集中間時有闕文又霅川集末跋唐五王醉歸圖一萹書桞子厚伊尹五就桀贊後一萹書王簡死事傳後一萹書金莭婦傳後一萹書集芳詩文卷後一卷卜釋一萹悉有録無書蓋蠧蝕殘缺今亦仍其舊冀在明初與宋濓張羽姚廣孝相倡和詞意清剛不染元季綺靡之習雖名不甚著而在一時作者之中固亦肩隨無愧也乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:478d5b5e7d0aa0e581a0f3bca57e8f347bd1704532d2f041475b57f243067ea8
