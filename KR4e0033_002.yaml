body:
  text: 尚絅齊集卷二明童冀撰金華集下賦樂善堂賦世有至樂兮非荒忽與混茫僉不悟其在中兮繽外索其皇皇䝉萋菲於文繡兮豢臘毒於膏粱聵五音以為聰兮昧五色以為明外耳目之暫愈兮衷憂患之搶攘惟賢達其蚤覺兮體吾樂於天常揭孟氏之遺訓兮建髙明以為堂仁以為柱兮義以為梁嚴忠信以植內兮外禮間而為防正牙籖之秩秩兮炳聖謨之洋洋儼博帶而峩冠兮抗髙論於虞唐伊萬善之攸萃兮嗟吾樂其未央昔宣聖之飯疏兮藐富貴如浮雲顔氏之庶幾兮在陋巷而忘貧舜雞鳴而孳孳兮又樂取之於人軻反身而誠兮亦強恕而求仁企聖賢之遐躅兮曽莫軌其遺塵魏罃之獨樂兮乃從欲而病民郭善善而弗用兮遽顛國而隕身援古事以鏡戒兮恆惕厲而書紳東平之嘉善兮克永終譽滂不為惡兮乃因強禦固厥遇不同兮惟吾行之不詭君子兢業兮有終身之憂勉修善而弗怠兮汔心逸而日休小人之徇名兮亦矯情而外飾羌患得又患失兮益中心之戚戚善與僞其幾何兮憂與樂其倚伏臧否在人兮自求多福彼趙孟之所崇兮亦趙孟之能卑繄天爵之尊嚴兮匪夫人之得私諒俯仰之無愧兮實君子之攸宜亂曰吉人為善惟日不足將乾乾而夕惕兮寧懷安而自佚嗟善人之不可見兮吾將樂其善而無斁雪賦有序文賦曰賦體物而瀏亮則體物乃賦體也雪齊寂寥偶思醉翁汝南故事輒用禁體物語作賦一篇然要非賦體讀者不以辭害意可也歲律邁餘寒淹積陰泄微陽濳氷霜沍結天地戒嚴於是滕六啓途𤣥冥御驂召屏翳役飛亷雲騎畢屯風刀斯銛戰野而千林振槁鏖山而萬疊埋嵐沙揚朔漠氛連天南湯泉晝凝火井宵熸飛霰清道以先集雨雪接迹而仍兼其始至也則蹁蹁蹮蹮乍却乍前儷舞鶴之毿毿其少進也則淅淅瀝瀝載疏載密殷食葉之春蠶羌徘徊於兩間漸掩苒於重簾紆回風之妙舞瑩玉麈之清談妬歌臺之粉英玷書室之牙籖投明月於暗室倒寒光於虛簷仰而睨之則馮馮翼翼邈混沌未判之先天俯而察之則連連延延緬海濤雲靜而風恬山嶽夷其峻險乾坤大其包函混一視而同仁霈德澤而遐沾纍萬鈞之莫舉由積漸於微纎調玉燭之至和兆金穰之吉占當斯時也孔席罔溫墨突弗黔縮馬牛其如蝟凝土脈之不黏僵洛陽之髙卧滯灞橋之幽探遡北風而悲歌鬱憂心其如惔已而馮夷返斾羲和載暹雲陳解馭風師鼓儳廓萬里之青冥流片月之氷蟾耿疏梅於逺空挺孤松於寒巖客有棲遲下邑偃蹇窮閻平蔡之心未已泛剡之興方酣悵白雪之寡和睇青雲而自慙於是泚璇霄之珠露濡玉兔之霜髯聊攄懷而作賦顧體物其何嫌閔春雪賦次前韻去冬大雪豫既竊取醉翁之義作賦一篇入春雨雪彌甚當陽和發育之時肆陰沴嚴厲之氣草茅隱憂不能自已輒次前韻復為之賦庶幾觀民風者或垂采焉伊大鈞之槖籥兮運四序而弗淹肆天髙而地下兮囿動植與飛潛方青陽之肇和兮忽𤣥隂之載嚴留雨雪其彌旬兮汩泥淖於征驂緬敶詞於九天兮跪敷袵於飛亷悼下土之凋瘵兮厲戈矛之方銛四郊闃其莽蒼兮皓積素於層嵐繽中華之簮組兮蹇就食乎江之南宇宙廓其無塵兮寂炊煙而晝熸遘桂玉之交迫兮果憂患而仍兼睇原田之牟麥兮失翠羽之毿毿閼柔桑於既萌兮曷筐筥之可蠶願上天之垂鑒兮散陽光於重簾彼盈尺之呈瑞兮誠不根之緒談申黃竹之哀歌兮殷餘聲於簡籖回飈忽其振林兮驚落屑於梅簷覽世故而惕厲兮恆夙夜而罔恬考春秋之灾異兮驗倚伏之相函方百穀之始播兮亦霢霂之既沾宜條風之扇和兮􅉡花雨之亷纎諒天道之匪逺兮徴人事而可占肆干戈之擾攘兮化頒白於黎黔迅日月之跳丸兮孰煎膠而可黏慨李訴於千載兮睨虎穴而勇探誠功業之不建兮鬱中懷其如惔嗟競時之桃李兮遲榮耀於朝暹固豫生之䝉昧兮敢冒進而自儳送豫目於孤鴻兮耿豫心於寒蟾偉喬松之耿介兮表獨立乎嵌巖景袁氏之髙躅兮偃僵卧於窮閻映孫生之餘輝兮潄六藝以沉酣仰廟堂之調燮兮配臯䕫而無慙瀝豫衷於繭素兮託豫辭於兔髯及太史之觀風兮列民謡而何嫌雪賦三次韻庚子冬大雪入春未已偶效醉翁禁體物語作賦再疊今冬雪中登迎華觀因復次韻賦之以呈用和郎中云愛柏先生觀雪乎迎華之觀招𤣥暢之沈約懷嶽陽之仲淹慨斯人之既逺發德光於幽潛乃延梁園之鄒枚萃金馬之徐嚴道置鄭莊之驛門停晏子之驂有生末至立于堂簾筆陳賈百戰之勇鉛刀利一割之銛于時瘴海息波丹崖掩嵐北風興乎衛詩干城美乎周南兵塵廓其晝清烽燧寂其宵熸合四美二難之㑹有文事武備之兼東望則天台桐柏羣山出沒翼霓旌羽蓋之毶毶西望則雙溪澶漫白石璀璨孕扶桑甕繭之氷蠶南望則括蒼木末氷崖合沓溢瑶空爽氣於疏簾北望則芙蓉嶻嶪竒峯玉立對瓊樓羽客之髙談先生徘徊四顧授簡典籖激清風於蓮幕索孤笑於梅簷起謂客曰方今雨暘時若武嬉文恬美化洽乎江漢先聲讋乎殽函瑞雪霈膏澤之潤草木畢勾萌之沾搜異材於巖穴用無間於洪纎四序調玉燭之和三白應金穰之占客顧室而懸磬竈突煬弗黔忘鵬翮之天飛滯蝸涎之璧黏曷不掞白雪之髙詞睨青雲而冥探舍陋巷之獨樂拯斯民之焚惔客乃磬折傴僂拜且謝曰天造草昧大明繼暹股肱之臣既東戡而西定仁義之師不阻隘而鼓儳炎精麗暘谷之烏餘光被月竁之蟾義聲漸于朱垠仁風扇乎氷岩蕞爾樗散遁迹閭閻懷雪案之辛勤玩六籍以沈酣廟堂之髙方稷契之比德山林之下託箕潁而何慙先生瀏然一笑援修柏之蒼髯尋嵗寒之深盟吾與汝其無嫌閔已賦次前韻閔豫生之蹇厄兮胡嵗序之弗淹獨乾乾其夕惕兮玩六籍以沈潛窺詩禮之中正兮識春秋之謹嚴固陋巷而簞瓢兮寧羡乎服車而駕驂申古訓以自飭兮志直溫而簡亷顧孱質之駑鈍兮極砥礪而弗銛昔豫之約吾心兮樂雲水而煙嵐遘中原之多事兮蔓戈鋋於東南羌嵗行之既復兮鬱宵烽其未熸慨曩嵗之薦饑兮又疫癘之仍兼蹇煢煢其孑立兮甚孤鶴之毿毿憂來忽其無緒兮沸繅繭之春蠶耿青燈於𤣥夜兮面搖搖之風簾搜陳篋之遺篇兮味前修之緒談惟昔賢之勤政兮警中夜之投籖亦焚膏而繼晷兮惜短景之經簷矧豫生之寡昧兮敢怠遑而自恬違亂離而適全兮仰大鈞之包函繄文治之聿興兮敷教雨而濡沾伊大匠之掄材兮諒無間於洪纎顧出處之靡常兮爰命龜而載占曰孔席不暖兮墨突不黔彼跂壁之微蝸兮適濡蕤而自黏豈伊人之為靈兮弗旁搜而逺探聆斯言而遐舉兮釋中懷之憂惔搴若木之飛英兮挹扶桑之朝暹羌反顧而忽悟兮嗟吾言之夸儳喟人生之一世兮駛旦暮之烏蟾茍修名之不立兮愧莘野與商岩誠侘傺於軒冕兮亦何異夫蹭蹬於閭閻激商音其浩歌兮命清尊而醺酣及齒髮之未暮兮庶斯言之無慙瑩剡溪之雲英兮擢廣寒之霜髯聊矢辭以自誓兮配閔已而何嫌述志賦次前韻豫悲不及古之人兮汨時俗以自淹進微黃鵠之遐舉兮退慚鱣鮪之淵潛緬髙風於巢許窘逸步於徐嚴日栖栖其弗遑兮蹇却行之羸驂繄深遁而逺逝兮愧於陵之未亷將希用於當世兮又悲鉛刀之為銛旦豫涉於雲林兮挹蒼翠於晴嵐營菟裘於下邑兮謝捷徑於終南羌延矚於原陸兮般野憐其未熸儻斯懷之誠遂兮信熊魚之可兼漱石泉之淙淙兮䫿岩花之毿毿固草衣而木食兮亦何事乎耕蠶蔭白雲以為牖兮揭氷泉以為簾席風林而偃卧兮面雲山而髙談縆瑶瑟之朱絲兮倒緗帙之牙籖搴薜荔於前榮兮聆松濤於後簷夫豈蟬蛻而飈舉兮庶怡神而養恬方宇宙之紛爭兮日有事乎戈函幸疏拙而見遺兮茍自足其沾沾寧浮沉於市里兮競錐刀之微纎伊豫志之堅定兮奚龜䇿之載占曩豫之自許兮竊有志乎蒼黔懷鴆毒於晏安兮甚濡膠而自黏進既才之匪稱兮逝將幽處而窮探茍一夫之弗獲兮詎忘心之憂惔濯豫纓於滄浪兮晞豫髮於朝暹將矢辭以自誓兮懼羣言之儖儳悄空山其無人兮佇孤光於寒蟾睇白雲之孤飛兮撫蒼松於嵌巖解聲利之矢韜兮邈塵囂於里閻淡暮山其凝紫兮送落日之紅酣茍豫情其信姱兮企古人而何慙斸雲根之鳥翼兮擷碧澗之龍髯聊引年以玩世兮追松喬其何嫌琴操天莽莽兮日曛復幽幽兮曀雲欲籲天兮不吾聞謂商暴兮吾君謂姬仁兮吾為之臣采西山兮蕨薇聊以禦兮朝饑唐虞世逺兮吾安歸右西山荆山兮日曛欵豫璞兮君門世玉石兮罔分皇覽以余為謾足再刖兮心不懲豫玉誠珉兮君之明痛泣血兮山阿君不聞兮奈何君不聞兮矢心不移石之腐兮君我知右荆山越山兮峩峩越之水兮曾波父不見兮奈何父不見兮泣於昊天天不聞兮豫生可捐江之深兮深可測天有知兮父可得父可得兮豫悲釋右越江我昔家兮禾山之陽今我曷為釣于蘭江禾山之下有黍有稌我田我漁我室我宇自我不見三載于兹江水東流悠悠我思右禾山西江蕭文用從宦蘭江嘗有歸歟之歎其家禾山也為作禾山操以泄其思云蘭生兮湑湑斂厥華兮混蕭艾而羣處世罔余知兮繄其所孰植於門兮芳以賈患蹇捋鉏兮曷返質乎空山視世奚悲兮嗟嗟乎爾蘭右閔蘭辭醉經堂辭為中山賈實伯輝作繄𤣥酒兮味淡泊醒洙泗兮釀濓洛誰其得之兮顔氏之樂酌聖言兮以道酬酢挹孟之醇兮視馬鄭其糟粕彼昏不知兮疇其先覺宋氏二子字辭自序太史宋先生之二子伯曰瓚字仲圭清慎端慤季曰璲字仲衡敏而有文先生嘗俾冀序其說冀惟古者命名之義其别有五曰信曰義曰象曰假曰類取於物為假假者寓名以存其義者也夫名者義之符也字德之輿也名以章義義以制字字以載德德以行禮是以名成而義著今先生之命二子厥有㫖哉夫瓚者宗廟之器故稱潔焉璲者佩服之象故取平焉昔之君子比德於玉良有以也古禮有字辭繫之以辭曰民之初生父命以名既冠而字是曰禮經古之君子以名考實名實相須是謂成德瑟彼玉瓚黃流潔清穆穆清廟厥作祼將亦有佩璲有瑲葱衡秩秩大庭周還有章敬爾威儀維民之則匪物為珍繄德其物出門如賔承事如祭夙興夜寐戰兢惕厲展矣君子戒之敬之我作斯銘式配字辭王氏諸子字辭有序古者子生三日則父命以名既冠而友字之禮也中古以來始為之說誠欲其循名顧義焉爾古禮之廢久矣歷陽王君東彞名其諸子曰璥曰璛曰瑾曰圭曰玫曰碔屬豫字之且徴其說豫謂古君子比德於玉非徒然也詩云伐柯伐柯其則不逺循名顧義則豈逺哉請字之曰敬肅謹圭文武益之以公公者正大之謂體是六德輔之以正大亦可以為成人矣雖然玉不琢不成器士不學不聞道今君諸子質信美矣盍亦各顧厥義而益務學也哉異日述君羣玉之府觀厥中和之成則大圭拱璧天球琮璜所以登郊廟而儀朝廷者是必有在古禮有字辭因申厥義為之辭曰敬以持已肅以待人禦侮以武黼黻以文謹而將之執圭是則洞洞屬屬如將弗克勉成一德厥有令名修之弗怠全德可成士之成名玉之成器百爾君子惟學為貴姜處晦字辭有序姜君彥名蚤嵗嘗鋭意問學有志功業蓋將侣金閨之羣彥依日月之末光以焜耀當世既而嘉遁丘壑更其字曰處晦以自隱焉豫聞而疑之夫處者動之機晦者明之徴也古之君子其處也以俟夫動其晦也以養其明非止於此而已也盍亦觀夫水與月乎夫水以不息為體者也然不蓄而積則無以盈科坎而放四海月以明為用者也然不魄而晦則無以復朓朏而致弦望今君之處夫晦也其將終隱於是乎抑亦處而有待也聞諸古禮有字辭因繫之辭曰處者動體晦為明徴如水之漸如月斯恆混混源泉蓄而有待盈科而進放乎四海月之踰望營魄載生既晦而朏其光乃盈相彼潢汙朝滿夕涸蘭薰膏火秪以自鑠衣錦尚絅暗然日章亦有美玉韞櫝而藏展矣君子允蹈斯義朝斯夕斯誠之為貴鄭仲涵哀辭有序浦陽鄭仲涵與豫交三十年所居相距僅百里然自始及今㑹合者無幾焉蓋豫杜門為童子師仲涵足迹罕至城府故間能一㑹㑹輒契闊纍嵗今年春豫卧病再閲月與仲涵不相聞暨豫疾起而仲涵死久矣嗚呼仲涵之殖學砥行不獲一用於世其不大可哀耶然犧尊青黃乃木之灾仲涵之不用安知其非幸耶矧仲涵生孝義家族姓纍千百指公私內外各有攸職仲涵獨以疾無所與挾冊讀書安坐而食仲涵之所得良亦厚矣然仲涵亦無他疾苦惟司聽有未瑩其為學更得以專志焉年將知命人道略備奉先迪後具有家法其亦可以無憾已矣昔韓子作歐陽生哀辭哀其父母老無所於養仲涵無是也故豫之所哀不在於是夫天之生人未嘗不欲其安也人之所貴乎夀考者亦在乎安其生也竊嘆夫世之人困頓道途䝉犯霜霰至於老死而後已彼雖夀於彭􅖫亦奚益於生哉若仲涵者既獲安矣而不假之以年將天靳夫安不欲人多得耶抑人處夫安者理誠不可久耶使仲涵後死遂其著書立言之志則其所就未可量也是則豫之所哀也仲涵有子能世其業其亦可無憾已矣豫生先仲涵二年由其安不逮仲涵而來者未可期也是亦豫之所哀也繫之以辭曰蒼蒼無倪上有天耶人之有生其偶然耶貴賤夀夭果無預乎其間耶相彼世人其生孔艱憧憧道途老死百年亦有君子式遂其安夀則不永孰獲其全我觀古今萬化一原委順而已理亦何愆嗟惟先生處世獨閒身雖云亡不亡者存有子績學克紹其傳奕奕髙門子孫日蕃我作哀辭以慰後昆匪君是哀用哀世人贊友琴生贊有序友琴生者尚友於琴也生倜儻不希合於時常登山臨水絃伐木之詩則悲歌慷慨豫竊悼友道之不古重感生之志因為之贊云友者五品之人倫將以取乎人不交人而友諸琴君其何心郡守小像贊外圓而內方外柔而內剛惟其圓故於物無凝滯執其剛故不與時低昂此其所以當用武之世牧千里之郡而能邁迹乎龔黃豈詩所謂豈弟君子邦家之光耶銘無逸齊銘有序暨陽俞伯仁名其齊居曰無逸益將貽厥子孫也間來徴豫銘詩豫惟無逸之書周公所以戒成王也末學謏聞豈能窺其藴奧哉姑述稼穯之艱難所以啓後人者為之銘曰天地兩間中立者人天運不息人生在勤相厥農民服勤稼穡一日不耕或匱其食有土有壤是耨是耰我茍無逸嵗其有秋惟昔先民罔敢遑息厥子不知乃諺乃逸聖有謨訓無逸是師匪惟稼穡百行是宜奕奕髙堂用貽爾後百爾子孫庶其肯構夙興夜寐陟降在兹所其無逸弗替引之清白軒銘舜江楊瑞名其齊居曰清白軒昭先訓也金華童冀為之銘曰民之初生肇自古先木之有本水斯有源在漢東都政由宦寺桓桓太尉振國之紀世道方否志則弗伸獨遺清白埀裕後昆舜江之濆其流湜湜厥有聞孫於焉是宅祖德日逺遺訓弗忘日星昭埀有扁在堂曷承其清曷守其白匪涅不緇匪撓不濁清爾志操精白乃心毋曰暗室上帝是臨朝斯夕斯戰兢惕厲造次顛沛罔敢失墜化行一家肇由一身曷止一身貽厥子孫自我先人克承克繼四世上公垂則後裔嗟我承式亦有後人無念爾祖淑慎爾身百爾子孫以引弗替我作銘詩永錫爾類讀書齊銘聖人之心寓諸方䇿讀而知之措諸事業詩書禮樂易象春秋萬理咸具無一不周兩漢以還各立訓傳繁文日滋去道逾逺不有濓洛孰濬其源其源孔長其流遂分聖有謨言學問思辨匪惟知之貴乎實踐大學之道修齊治平學而砥此其業乃成展矣君子是則是效道不逺人庶其允蹈針五針豫生三十有八年齒日以長而業不加進身日以困而志益荒落偶讀韓子五針而有感焉然豫之所愧者非特五事而已姑先其近者云學成于勤而遊以荒弗荒而勤其道乃光在昔大禹寸陰是惜吾儕小人放焉朝夕當寤而寐當誦而嬉齒髮逾邁而業日隳前之嵗月如駒馳隙後日幾何能不自力往者莫咎來庶可期及今弗勵後復何追右遊針人知善言為世之利而不知為時之忌知直言能藥於人而不知秪愈其身言之信美於已奚利言之諒直適以招疾子不見夫立仗之馬一鳴斯黜貴言者寡冥冥默默可以保生鴈不能鳴亦以自烹謂子終默木鴈之類慎而擇焉庶其無悔右言針行者一身之基始之弗慎終焉曷追我今告汝謹始之道惟義之從惟禮之蹈時之所隆於禮或愆衆人所趨汝則邈焉茍咈於時義固斯在舉世所非汝謹勿怠惟忠與孝惟禮與義造次顛沛罔或失墜既慎爾始又勗爾終朝斯夕斯以靖厥躬右行針是非之心人皆有之好惡之公已焉得私好其可好反以為媚惡其可惡卒以為忮當惡而好當好而惡人皆謂然汝獨不悟汝非仁者汝非鄉願同為合汚察斯媒怨聖有謨訓誰毁誰譽佩之終身衣闕右好惡名者可畏而不可闕一名衆忌攸歸茍弗闕不顯其光衣錦尚絅闕斯灼亦既煜煜能不銷闕病無其實弗病無名汝之不闕幾何其聞者久闕右知名針說雜說太上立德其次立功又其次立言士志於立言其亦不獲已哉然自六經而下立言滋多去道逾逺而言固未可廢也亦幸其有禆於世教焉爾去古寖逺諸子各以所挾馳騁當世髙者騖於𤣥虛若捕風繫影浮海望洋而無所底止卑者淪於綺靡括青配白浮商泛羽不異夫好鳥繁音之過耳也如是而曰著書立言焉嗟夫古人之所謂立言者其若是夫人之所恃以生者食與衣而已至於珠玉人何賴焉然世不貴乎菽粟布帛而寶明月夜光者以其得之艱也得之艱而不適於用人猶貴之矧其適於用者乎賢才之處世其適用又非菽粟布帛之可比也然纍千百人不一人焉其亦可謂得之艱矣然世非徒弗之用也又且弗貴焉非徒弗之貴也又或鄙賤之今有人焉毁璧棄珠而莫之惜則人必爭非輕之有賢才弗之知而世且習以為常其可嘆也夫貴生於所無賤生於所忽中流失船一壺千金昆山之下以玉抵鵲彼非弗知玉之可貴瓠之可賤也急其所賤因忽其所貴也士生斯世亦若是夫雖然寧為玉弗為瓠也碔砆售而珉璧混矣將韞櫝而藏之乎抑待價而沽之乎玉乎玉乎吾懼汝之抵鵲也葛之柔不能自立附之喬木則可以淩雲參天石之重至不可舉載之方舟乃可以越江浮海何則得其所因也人之因於人亦若是已雖然木仆舟覆則終不免於泥塗之歸沉淪之棄爾是以君子貴自勉焉昔者齊有管仲雖無鮑叔吾知其必能致一匡九合之功漢有陳平雖微魏無知其六出竒計未必不用也世之志士猶喋喋然曰世無鮑叔魏無知云者亦誣甚矣哉楚靈王為章華之臺鳩民以役之晝弗給繼之以火民疲弗堪右尹子革夕王謂之曰臺其崇矣夫對曰臺則崇矣臣懼王之國其日隳也夫土者臺之基也民國之基也今王徒知積土以崇臺而不知養民以厚國是崇一臺而隳一國也王弗聽臺成而及於難楚王好細腰後宫希寵幸者咸約食以效之餒死者相藉也豫深悲之夫寵幸者身之榮也身死則寵幸何賴焉彼婦人之知宜不及此也世之名丈夫位卿相者類皆徇君之欲君悅佞焉則已訑訑而為諛君好罔焉則已墨墨而為昏此無他誠欲固其寵利也而不知卒僨其國以及其身亦足悲夫燕人有善奕者國中無與為敵趙使之燕聞而欲觀之請諸燕王而召之且召其次善奕者與之角適次善奕者病焉求而得其下數等者既至善奕者心得甚睨之若無人置枰布子惟手是應弗屑計也下數等者惴惴焉栗栗焉熟思而審計惟恐其失之也終局而善奕者北焉君子曰事之不可不慎也如是夫夫奕小數也善奕偶弗慎反取敗焉而況於將三軍本兵柄者其可以小敵而弗慎也哉惠子與客觀魚濠梁之上人魚相忘也投之以黍其來盈車明日復往觀焉魚潛而弗出惠子怪之客曰曩子之來也意未嘗在魚也今而羡之有鉤餌之心焉惠子嘆曰甚矣物之靈也夫人之機心一萌魚猶知之矧以人為物之靈而欲以機心御之哉越人釀酒大廡下夕則鐍其戶人跡罕至群鼠輒肆飲焉纍纍甕盎間呌呶衝突越人弗知也一夕客至中夜取酒觴客燭而往鼠方酣飲適甚不虞燭之至也驚遽溺焉世之乘暗而盜利沽名者盍亦少自警哉造父之太行見覆車焉其轔輻相闕其御笑曰是所謂前車覆而後闕莫甚焉其御進曰君徒笑之闕紂嘗非夏桀矣而不知卒踐闕紂矣而不思改其度也今君闕不已安知後之人其不嗤君也哉阿房宮賦結意趙有大賈耄矣所居室廬堅緻完好猶日視其罅隙而時葺之杞梓楩楠無不樹也棟梁榱桷無不儲也常曰吾後世子孫誠賢信克任堂構矣茍或不然使吾材素備庶免其覆壓焉鄰之民嗤之既而賈沒十餘載大風雨以震鄰之屋多壞賈以有備獲免君子曰趙賈可謂貽厥孫謀者矣使古有天下國家者能預養賢材以貽後世亦何傾危之有也哉越之南有錦雞焉每旦日出則出晞其羽悅其文采揚揚自得也既而浮于江滸顧見其影睥睨翔舞徘回不能去久之眩而溺焉夫雞惟蔽於文而忘其身之溺也人之眩於文而自取覆溺者亦豈少哉靈丘之鵲與上林之烏相遇乎丹穴之山烏謂鵲曰吾與若形質無大相逺也音響未至遼絶也胡若鳴則遭人之喜豫輒逢彼之怒也鵲曰是固然爾夫豫之鳴先吉而示之徴故人喜焉子之鳴未凶而告之咎故人惡焉子不聞夫夏癸商辛之廷乎飛亷惡來訑訑而諛則恱龍逢比干謇謇而爭則殛矣子何知之晚也烏不懌復相與質諸鳳焉鳳曰有是哉子所謂不惟其時而自取焉者也昔豫當舜之時嘗一儀焉文王之世嘗一鳴焉千百年間豫特一鳴一見而已今子不惟其時而聒聒焉日號諸人何往而不逢怒也哉鼠斃鵝說物之戾常者雖小足以致異非偶然也以鼠之微而能斃夫鵝焉亦怪矣哉夫鼠陰類小人象也鵝素質皓白有亷潔之象焉豈其有亷潔之士為小人所中傷乎雖然彼亦處汙濁而僅能自潔者爾然有羽翼而不能髙飛逺舉斯其所以致害也與詩叶韻辨音韻之書古未有也非古無音韻也未嘗有其書也赤子生而五方同音其本然也長而變於時俗其習然也然閭巷小人妾婦孺子見於歌謡者初未嘗變也自沈約撰四聲韻一以當世之音為主正音於是微矣然古之載籍具存識者尚能辨之也至宋吳棫復取古之正音變於今者為叶韻焉韻不待叶也唐陸德明釋羣經間有叶韻之言未敢的為之名也陸氏猶未足徴也漢鄭康成為詩箋其名物度數音韻之說詳矣誠有之則鄭氏言之矣鄭氏亦未足徴也齊魯韓三家以詩專門三家未嘗言之也不寧惟是子夏親傳聖人之經其序詩也有曰情發於聲聲成文謂之音音韻固重矣誠有之子夏寧靳而不以語人乎子夏猶賢者也三百篇親刪於聖人取其善惡可為勸戒者以訓後世曽謂音之不正而聖人不刪正之乎然詩猶非聖人所自作也易之爻象皆出於聖人其韻語猶詩也自今觀之秦漢以前載於竹帛者皆可考也東都而下音漸不古沈約已承其誤吳氏察之弗精又强名焉過矣不然則先秦古書若天明慶行之屬無一語作今韻者其是非較然矣夫文有音韻者猶弗之能察則無音韻之可考者又可既耶嗟夫聖人之大經大法載諸方冊後世所當明辨之者宜亦多矣人多忽之顧屑屑乎音韻之辨亦末矣雖然行逺自邇登髙自卑古之明訓也若夫逺且大者冀雖未逮也竊有志焉傳璜溪生傳璜溪生者蓋太公望後人也始太公釣渭水得玉璜故生因以為號焉生少時遊心問學漁獵載籍亦有志釣取當世功名㑹天下多故遂脫略世務放浪山澤間垂綸終日弗設釣餌志不在魚也人或疑焉豫聞昔之尚志士多隱迹屠釣間生豈其人耶贊曰昔嚴子陵披羊裘釣澤中庸常人爾及其動星象歸江湖抗節當時流芳後世遂與許由務光爭烈矣使生有志於斯豈下古人哉趙立道傳趙立道者故宋宗室諸孫也家素饒於財立道幼即簡靜寡欲居常弗御酒肉年四十復屏去醯醬甘脆之味日啖饘粥兩杯盛暑未嘗揮箑不澡沐者亦三十年客至輒促席清談或終日忘食晏如也豫間至浦陽嘗造其居立道時年幾七十矣雖攻苦食淡風神秀拔氣貌腴澤豫甚異焉嘗間空山窮谷中其人食淡寡欲夀有至百數十嵗者然皆山澤之臞立道豈所謂義勝而肥者耶贊曰老子有言五味令人口爽世之嗜甘臘而獲鴆毒者多矣間立道好神仙則道之出口淡乎其無味者立道其有得於是乎非耶貞烈姜女傳貞烈姜女寧者越金華邑人也姜故邑大家以資雄鄉閭間子姓姻䣊率以華侈相髙寧獨尚質素居常紡緝足不踰閨閾其母憐之每曰妾媵幸不乏母自苦也寧曰聞女之職業以麻枲絲繭為事竊自樂之無苦也聆諸兄讀誦往往習知其大義戊戌冬兵入郡城母挾寧暨諸女同避一室兵猝至徑前持寧欲犯之寧目其母姊姊咸出即抽兵佩刀自剄兵不意愕眙大呼他室兵皆至曰此貞烈女也嗟惋者久之豫與姜同門知其事為詳懼其久而湮沒無聞也竊取春秋傳信之義為之傳云贊曰昔劉向傳列女取其事可為勸戒者以貽後世若寧者豈不足為世勸也然世之業載籍襲圭組者或不知出此聞寧之風亦可少愧矣楮虛白傳楮虛白字曼卿㑹稽人也以文墨顯其先有楮先生者與中山毛穎𢎞農陶泓絳人陳𤣥相友善事見穎傳虛白悃幅無華不事先業病時狹薄務崇寬厚弗拘邊幅之行時郡守有卧護淮陽者召參帷幄虛白亷隅修整處置周密人莫窺其罅隙守得以髙枕無事先是居臺閣者風稜嚴厲郡邑冷官夙夜弗遑溫席往往以病在告賴虛白調護獲終更者甚衆性和易與人交不為翕翕熱人自以為坐春風中然素簡質外若不可測而中實能容物亦不以顔色茍媚於人同儕金張羅韋方貴幸用事出入卧內比周䝉蔽虛白嫉之未嘗與接後大㑹二人者侍姣服華麗一坐風動虛白屏退坐隅邈若無人歎曰吾乃今知炎凉之世態哉因自解免未幾守坐事罷金張羅韋相繼辭去抗塵走俗容色銷沮惟虛白不易其素云贊曰自竹帛道廢古之載籍賴以弗墜者楮氏之力也虛白雖不學無文然能世其清白不為市道交是亦可尚云墨君傳墨君其先蓋出孤竹氏孤竹氏有國當商周間子孫代以貞節自守厥後有居淇澳者事衛武公詩人美之漢興渭川諸族尤盛惟墨君之先無聞唐元和中協律蕭恱始物色之至宋而文洋州同狀其志節其名遂著君少有奇氣恆欲樹立功業垂名縑素然質性耿介不能與時俯仰方他族貴盛起家釋褐紆服青紫者布列中外君未嘗過焉家徒四壁每清風時至皓月在庭悠然自得不知形影之相忘也襟韻蕭散人一見之則鄙吝之心俱盡亦可謂有德君子者聞其先世亦仕嘗綰墨綬故子孫因以為氏戰國世有名翟者又一墨家者流非其族贊曰孤竹國自夷齊克讓中子嗣有其國其後支庶皆有分地惟墨君無茅土說者以為别出管城裔云連華傳陳氏園池忽産瑞蓮並蒂聯芳氷雪其華豫因為之傳云連華其先萍鄉人當司馬氏之時有主浮屠之社者一時士流之所欣慕子孫世以清白相承焉華蓋其後也華之生也其父以竒偶之數筮之遇坎之比曰是謂比其首克昌厥後子人同心麗乎重陰出汙而清處幽而馨其澤中之英乎既而華與其弟實㝈生為總角聯居篤同胞之義中道而立不能與世浮沉病時之險薄也尤尚交道傾蓋相遇至白首而不渝元和中使者採訪河間聞華之名舉而薦諸朝昆季相繼脫白俱宦於陳之澤陂習其水土遂終老焉兩房諸子尤苦心於學治長年術亦見齒於人厥後有顯於濓洛者蓋其族也然豫不能物色其人故未暇詳其世系云贊曰連華昆季當波流橫靡之中而能卓然特立直道不倚可謂君子矣嘗聞其支庶有别為何其生亦蕃然未聞有連理者周成王之時有合穎之禾産於唐又一農家者流非其族鞠𤣥傳鞠𤣥剡人也其先蓋黃華之苗裔當戰國時有名英者為楚三閭大夫之所齒至漢而南陽諸族始盛晉末有家柴桑者亟為靖節徴士所採擢其後遂顯於世𤣥之生也實有異焉其母管城氏曰嘗遊墨池感而有娠厥父以𤣥經筮之曰黃中通理金復于水母顧厥子童烏之祥奕葉其昌太𤣥其有光及生狀頎而黝故命曰𤣥素業貧無立錐之地寄迹楮先生家時宗人競以黃白術顯賔客騎從雜遝旁午𤣥環堵蕭然晏如也逮諸族凋謝𤣥巋然獨存性沉默不以寒暑榮悴一變其色當道貴人或館致之尊諸座右既而久弗見及載召衣冠垢敝因拂拭之笑曰君非出塵之器邪對曰𤣥所謂抗塵走俗者遂自免歸君子謂𤣥合卷舒之義矣以時進退遁世無悶其知道者哉題跋題淡然齊卷保定馬仲凉雅性恬淡嘗出仕與有祿秩矣既老而休居扁其齊曰淡然以見志焉豫嘉其得出處之宜也故假繇辭以贊云淡元亨利幽人之貞彖曰淡淡也險而止乎潤柔外以正剛中而應是以元亨利幽人之貞也象曰澤上有水淡君子以薄於自奉不願乎其外初九淡其趾素履貞吉象曰初九素履積德基也九二華其衣裾中心泊如匪吝象曰華其衣裾行素位也泊如在中志舍外也六三淡其服赤芾在下雖榮弗處象曰赤芾在下義弗處也六四玉帛几几賁于其里象曰玉帛之賁嘉尚志也九五勺其𤣥酒挹之用缶匪鬯斯卣象曰𤣥酒用缶以饗帝也秬鬯非馨明德為貴也上六端冕峩峩章甫之加君子是宜象曰章甫在上髙不危也跋王氏家藏碩畫右仙都王公碩畫一通蓋南北否隔時也今觀其所取武侯而下論䇿凡九條亦海㝢未一之世也公之意槩可見已惜其扼于下僚鬱而弗施其子魯齊先生柏悼先志之弗伸也裝潢成卷以貽後人百年之間先達名公論贊相望所以發公之孤憤而惜事機之失者誠可為流涕也夫有志之士失時與位固足深憾其得時得位懷於宴安奄然無志者尤足恨也嗟夫聖人之大經大法布在方䇿舉而用之亦在乎人焉後之覽者其尚有感於斯跋米元暉畫古人論文多貴自然而巧麗不與焉豈不以雕琢者易工而渾成者未易以力致也今觀元暉之畫其殆文之渾成者歟然人之所好不同譬之五味各有攸嗜則雕琢者亦未可廢也君子欲知其人觀其所好可以得其人焉跋宋官誥陳君仲文出其先世宦牒示豫宋咸淳初元所授也時賈似道秉政國步斯瀕又十年而宋改物矣咸淳距今百有餘嵗而斯誥墨跡尚新夫有國者信任非賢猶弗克守以一誥之微有子孫焉乃流傳至今其可感也夫跋宋理宗御書後有宋理宗賜其臣劉竴詩令其繕寫唐人詩以進且有志貞觀開元之治其欲治之心可謂勤矣然帝王之學不在是也二典三謨說命之書帝王之學備矣若詩之為用蓋以示美刺垂勸戒誠有志於是周宣車攻六月之詩非當時急務乎舍而弗論顧屑屑乎貞觀開元抑末矣雖然誠有房杜姚宋之臣為之佐則貞觀開元之治亦未易少也等而上之唐虞三代帝王之盛詎非時君所願欲哉惜乎當時之臣不聞為是言展對遺墨為之慨然書鄭氏孝義卷後易曰父父子子兄兄弟弟夫夫婦婦而家道正孟子曰人人親其親長其長而天下平此人道之當然也人孰不知而莫克盡之者私欲蔽之也然有一人焉能盡其道有一家焉能行其道則世必爭稱譽之稱譽之不足又從而頌歌之猶以為未足於是相率列其事於邑若州州邑侈吾民之有是也聞之大府大府加禮敬焉上之方伯連帥以達於朝廷焉由是朝廷舉褒旌之典下蠲復之令且登其名字于太史誠欲以風厲天下也夫以一人一家行其當然之道而鄉黨知好焉州郡知禮敬焉天子加寵異焉亦可見人心之所同然矣然而四海之廣郡邑之繁未聞有一家一人興起焉者其故何哉徒知好之而莫思反躬效之也浦陽鄭氏聚其族同居九世矣其父父子子夫夫婦婦親親長長之道無一之不盡焉人美之則曰吾行其當然之道也事間于朝亦既加寵褒矣凡名公巨卿俊民秀士所以鋪張德美激楊風誼者炳耀簡冊亦未聞有一人興起焉豫與鄭氏居同郡誠慕其義而樂效之者顧以門衰祚薄事與志違竊嘆夫世徒好之而莫思反躬效之也嗟夫自大學明德新民之教不明誠意正心之功有愧宜乎修齊治平之效不古若也向使長民者誠恱鄭氏之風反求而明其明德以新吾民則孟氏親親長長之效豈欺我哉百爾君子無徒好之亦允蹈之書鄭仲涵文集後木之本深者其發必茂水之源逺者其流必長人之積學有禮義為之本則其放而為文也必肆而昌浦陽鄭氏同居九世矣其子孫往往行立而言揚惟仲涵氏生而孝友宜其問孝日就而月將深藏厚積不施諸用其所表暴僅見於詞章連篇纍牘根仁本義皆其日用之常故其切於世用如菽粟布帛異乎文繡之與膏粱嗟嗟若人今也則亡三復遺編有涕浪浪後之覽者尚有以知其人而弗忘書姚節婦傳後始豫讀五代史觀王凝妻事未嘗不為之感憤激烈竊獨怪夫五十年間亂離相尋貞女節婦宜亦多有然見録於史氏者一人而已將世衰道微人不知有禮義故邪抑處乎卑下不能自達於當世湮沒而無聞也婺為禮義之邦閨門之教敻非他郡所可倫擬戊戌之變死於節者蓋以十數豫所審知者得四人焉今觀李君宗表所傳姚婦李事信鑿鑿可徴其他獨吳節婦謝嘗見紀太史宋景濓氏若姜女寧方婦李者其貞烈亦可書惜豫言微不足傳信後世姑附見其名氏于此嗚呼禮義不明久矣以豫今之所聞見猶不克傳如此則五代亂離其不克傳者信亦多矣不然豈百年治平之效吾婺禮義之邦要非五代所可及也與序送徐進明序天下多事志士之幸而民生之不幸也夫志士非幸天下之多故也非其時則無以見其志士焉昔者三代而降天下多故無甚於戰國典午之季而志士幸遇亦無甚於斯世然當時生民塗炭為何如哉是則志士之幸誠民生之不幸也然非志士無以靖天下則志士幸遇生民亦與有幸焉海宇混一以來垂八十年晏安無事尚志之士偃蹇於山林巖穴之間沒世無聞者曷可枚舉視當時羣生咸遂幸莫大焉承平寖久兵弛吏偷變起不虞因以饑饉戈㦸蔓延半東南故世之志士往往攘袂奮臂日趨於功名吾友徐君進明亦有志焉進明早業進士薦不得志於有司懼親老不逮祿也將東走憲臺千王公大臣以發其志以就其功名歸以為親榮同遊之士既歌以贈之且徴豫序豫既傷天下之多故重懼斯民之不幸且嘆志士不世遇也聊於進明焉發之進明其慎乎哉毋以得志為可幸也異時靖禍亂者幸出於志士俾民生亦與幸焉則吾有望焉爾不然則居易俟命豈非志士之上䇿也哉送王明府序金華為邑不過百里而山谷居其什之三故其地類多磽瘠而鮮肥沃在宋嘉定間經界制行郡以邑居近郊其科賦視他邑恆數倍而邑於是始病邑之為鄉東西各六慶雲直郡城西南負山枕溪髙者多燥剛而卑者附砂磧無大陂澤以瀦水加之土性善泄而稍不時則黍稌無孑遺然其稅畝視鄰壤反贏焉以故其田多蕪廢不治里胥嵗代其輸至破産者相繼嵗壬寅建業王君興宗來宰是邑披圗考賦思有以更張之屬兵興事殷未遑遽革乃取一邑科調之外等其地里而髙下之由是兹鄉之氓獲少紓焉民方仰君以漸剔宿弊而君升倅南昌將戒行鄉之士民感君之惠謀所以頌君之德美者相與徴言於石豫謂君之惠利非止一鄉而已也而是鄉之民獨感之深蓋自嘉定迄今埀二百年其賦也厲民非一日矣前後長是邑者非一人其視民之困苦漠焉若秦人之視越人肥瘠也今君獨有志於是其賢於人也逺矣其惠利之及人也深矣宜其民之思頌德美而弗忘也惜豫言微不足為君重姑記其事之梗槩以慰邑人之思且俾後之長民者有所取式焉送沈樵雲序天下之物其可欲者必有纍乎人者也然物非能纍夫人也心蔽於欲而不能自克焉爾今夫南金寶璐大貝文犀其為物非切於世用者也然世之欲之者甚於菽粟布帛焉彼其飢不可食寒不可衣陸不可以載而水不可以杭也然世爭欲得之者以其能充夫欲也欲之者衆則其物不足以應世之求其勢必至於競競而不已不至奪攘矯䖍不厭也吾懼夫世之競之攘之者未有紀極也然人之生有耳目口鼻心腹四體固不能無欲也茍不節之以禮間之以義則必沉浸陷溺肆焉放決不至於淪胥以亡不止也夫南金也寶璐也大貝也文犀也飢不可食寒不可衣也陸不可以載而水不可以杭也有目有耳者皆飫見而習聞之也然而競之攘之者雖沉浸陷溺淪胥以亡而弗悟也夫鉤吻烏喙野葛鴆羽非病狂易心者皆知其不可食也今有目有耳飫見習聞甘心於沈浸陷溺而弗悟也夫鳥俯而啄仰而四顧獸深居而簡出誠以慮夫患也然而卒入於羅網投於陷穽者欲誘之且昧於不知也豈以人焉飫見習聞甘心於沉浸陷溺而不悟也武林沈樵雲棄紈綺之習為黃冠師彼其有見於此者耶夫雲之為物無心者也固非世之人所欲也世之人所不欲而吾取焉則不互於爭競而攘奪矣不至於爭競攘奪庶其免於纍乎樵雲將有四方之行持是卷徴豫言豫方懼世人之胥溺而不悟竊喜樵雲之有見於此也故書是以贈之樵雲名某故巨室子也生而厭紛華其淡泊蓋素志云送林子山歸浙西序道在天地間未嘗一日亡也其本具於心其用見於君臣父子夫婦長幼朋友之常其理易明也其事易行也太古之世民俗熙熙耕鑿作息莫知所為有聖人出因民固有而開導之使合乎中於是君臣父子夫婦長幼朋友咸得其常然古之道著於德而施於事功故其理易明而事易行後世道不行而託載籍以傳六經羣聖人之書是已嗚呼聖人之道不行徒託空言以傳其亦不幸也已雖然使無六經載道以傳後世則人之類不至于淪于禽獸者幾希嗚呼吾猶幸有六經之言載道以傳後世俾人知求之而君臣父子夫婦長幼朋友之常不至於大失也然自孟軻氏沒聖逺言湮一晦於異端之充塞再晦於漢儒之附㑹韓愈氏特出於千載之後著書立言排斥異端雖聖人之道不大行於時然學者由是知宗孔子黜異端逮夫濓洛諸儒一出敷闡正學六經之㫖粲然如日星麗天有目有識者咸知敬而仰之人之所以不至于淪于禽獸者庸可不知所自乎是則聖人之道雖不大行於時猶幸六經之言載道以傳後世謂道不藉言以傳不可也吳興林靜子山有志於道者也不逺數百里竭蹶來金華問道於葉儀先生范祖幹先生之門先生蓋學於文懿許公而得其傳者也許公之學等而上之四傳而至勉齊黃公黃公則受業考亭者也其師友相承可徴不誣子山之來也豈徒慕其名而已哉亦將傳其言以淑其身歸而推及於人人吾見考亭之學將大行於浙河之西也昔漢丁寬學易田何業成東歸何謂門人曰易以東矣子山之歸也則吾雖謂考亭之學必大傳於浙河之西亦宜也子山博學工文辭故豫推本六經載道之說與夫濓洛諸儒所以闡明夫道者以明之庶後之人或能因其言以行斯道則唐虞三代之盛於是乎在孔子曰大道之行與三代之英丘未之逮也竊有志焉嗚呼豈特今為然哉黃山采藥圖序新安汪山人賣藥金華市中人往往稱道之間踵門告豫曰某自幼抱奇疢嘗遊黃山遇異人授以服餌之術而疾良已由是往來山中山素多靈藥聞昔黃帝與容成浮丘合丹於此竊有志焉每風晨月夕荷鍤攜筐窮歷幽險遇有所得則擷之捋之間以藥人薦獲奇效兹來金華好事者繪而為圖不鄙見貽先生幸賜一言為之針砭焉豫惟天地之間生植蠢動無非藥者顧所以用之者何如耳姑以一草木論之其根莖柯葉用各不同矧有老者稚者細者巨者修者短者昂而仰者偃而伏者其所性既殊其可徇其名而槩用之乎不寧惟是也世固有以僞易真者鉤吻似黃精杜蘅亂細辛蛇牀類靡蕪又可惑其形似而一其用耶昔人嘗以良醫方良相矣豫於是而知用人之道焉夫人之才品萬有不同世果能不枉其才而當其用乎君子小人迹有疑似茍不審其真僞而進退之未有不為蛇牀蘼蕪者也因山人有請偶論及此遂書以贈山人名某字景榮其先世嘗有德於郡人子孫逮今蕃衍云宋太史新集後序鄉先生太史宋公蚤以文章著名當代其文舊有前後續三集行於世晚際維新之朝薦當載筆所以潤色鴻業登載勳庸者别為十卷命曰新集臨川黃公昭嘗為題其端㑹先生得告歸金華間以示冀俾識其末冀惟先生之文志古道者也古之道斯行諸今古之文顧不可新諸今乎兵興以來古道寖隱先生首翼文軌黼黻新運凡王業肇建內修外攘文事武備咸加纂録舊典新制蔚然可觀昔陸賈述古今成敗爰著新語桓談考當世行事厥有新論其視昔人蓋兼之矣年幾耳順好學靡倦六經諸子史傳䜟緯百氏之言搜羅剔抉自成一家其於著述之功方日新而未已也冀於先生無能為役過承奬誘於兹有年竊自結髮讀書知尚古道思附逸居舊矣第捐埃之微罔以增崇丘山益浚河海而餘波所及承潤良多詎容接魚目於夜光並碔砆於結緑珠玉在前適章瑕類固辭不獲因厠名末簡庶幾異日昌黎之門或齒籍湜云送金中孚序自阡陌開而兼并之患生賔興廢而遊說之風靡士生斯世其亦不幸矣哉昔者成周盛時有井田以贍其生有鄉舉里選以興其賢者能者故士窮居有以自養達斯見用於時何其幸也及周之衰諸侯擅制井田廢則豪強得以兼并而士始無以自存選舉廢則賢能弗獲進用而士始無以自達於是連袂接軫游說天下以口舌劫取爵位以輿服夸耀愚俗波流風靡淪胥墊溺至折首覆宗而不悔陵夷至于暴秦極矣豫讀書至戰國䇿未嘗不嘆夫士風之弊而又重悲其生之不幸也鄉使井田選舉之法未廢則彼詎肯甘心而為是哉漢唐而降其事槩可見矣兵興以來士風漸靡豫懼游說之風復萌蘖於此而深惕焉同郡金中孚學古而甚文誠尚志之士也惜其無田以為養無室廬以為安懷抱利器而弗克施也方且偃蹇下邑不期聞達世所謂背而馳者也間有薦之大府者俾授鄉校之經學豫於是深有望焉夫惟經學不明人徒見利而不知有義故戰國之弊是以至此極茍知有義則其所欲有甚於生者尚何勢利之有哉今有人焉以經學薦士執事者亦以經學任之士固以經學受知其效用當何如哉豫於是不能無望於中孚焉郡之大夫士率為歌詩以道其行豫與中孚交相好志相同也誠不敢效回路處贈之義竊懼士風漸靡猶幸中孚以經學見知也中孚尚勉乎哉士風丕變請自君始送鄧鍊師歸上清序金華距信之龍虎山僅七百里漢有異人居之聞其間多珍禽異獸朱草嘉木逮今居之者類多卓犖奇偉之士信其山之靈也僕少也有志遊焉膠擾壒埃因循未果幸而居抵金華山不半舍而近是山實晉皇初平牧羊之地雲根白石班班可識曩嵗恆屢遊焉兵興以來聲問不至山中者十年況所謂七百里外者哉去年夏鄧君仲修自龍虎山來覿其風度信其為山中人也因與之商略其山川風物今年秋復㑹之於𤣥暢樓相與道舊悵然念昔太史公足迹半天下而唐司馬承禎遍歷名山勝蹟僕誠不敢企蹤昔人然髙岸為谷深谷為陵昔之壯麗宏偉者已不可見今之僅存者其又可必耶嘗聞山有異人曰方壺氏妙藴胸中丘壑君之歸也幸為我寄聲儻繪山中之白雲飛以示我俾卧遊其間則異日入山不為生客矣因鄧君行輒疏此以致逺忱鄧君亦誠慤士名有道術者其再至也禱雨輒有應云送王鍊師歸省親序始豫讀昌黎公送張道士序深愛其有文武長才而寄迹老子法中以養其親蓋其不以功名纍其事親之志可謂知所重輕矣及方鎮搆兵乃不廢朝廷之憂詣闕獻書不報則拂袖徑歸非決於去就者能如是乎豫竊怪夫世之為老氏學者未始不以虛無自髙其視君臣父子之倫蓋蔑如也然而膠擾壒埃汨沒聲利求其能稅塵鞅解天韜者幾何人哉四明南澗王鍊師幼嵗以父兄命從黃冠師比壯遂歷遊名山博求真詮頗若有得㑹四方兵起徘回異域者逮十餘嵗今將假道海壖言歸定省慕吾儒之教力求贈言豫謂儒者之道不過明父子君臣之懿而已今君誠不忘倚閭之思駕言遄歸奉菽水之清歡時晨昏之定省則為子之道得矣耕田鑿井采山釣澤朝饔而夕飱冬裘而夏葛則養生之願畢矣又烏有離親棄俗絶粒導氣而可以致長生哉吾聞海上諸仙密邇蓬萊子歸其有所遇矣不然則吾儒所謂父子君臣之懿蓋亘千萬世而不可易者盍歸而盡心焉送城師序吾婺之叢林上首豫所逮識者曰東陽輝公輝公之道宏而邃其所交極天下之選如吾鄉則待制柳公侍講黃公禮部吳公咸與之交豫獲執經三君子之門因得以知輝公焉得輝公之傳者曰德隱仁公仁公之學介而通其所交亦當世名士吾鄉則郡博士胡先生仲申起居宋先生景濓王先生子充皆忘形與之交豫獲託後塵焉今又得鐵關城師城公蓋慕輝公之道而受學仁公者也方仁公講道智者山中逺邇學者雲集輻輳視城師獨超等夷由是延譽叢林亟登丈席烏傷金鱗山者唐曉悟禪師之道場也雖鷲嶺云逺而象教攸存城師之往也必將邁迹前修流風來葉今則錫飛金華之麓轅指繡湖之濵於是士林交遊重惜其去且冀其道之克行也相與來徴鄙辭以申贈言冀幸逮識輝公復託交仁公師弟子間且習聞諸先生之緒論其何敢辭惟昔道林湯休見禮於安石明逺推重當時流芳後裔顧豫誠乏謝鮑之逸才卓識然希蹤遐躅竊有志焉因述鄉諸先達所以締交方外者題諸篇端庶以為城師之重云春草集後序夫比興之述所以探六義之賾擷百氏之英模倣乎物象而攄陶性情者也誠理政之本風教之基躡藝苑之術徑涉詞源之津涯者矣粵自大雅輟響正始淪音秉柔翰者方駕乎麗縟之囿振教鐸者接軫乎紛葩之林夫其匠意立言摛華鋪藻鎪形月露馳情魚鳥闖海嶽之髙深軼雲霞之窅渺誠足尚已若乃比物寓興潄詞寄聲諷意達乎意表美刺緣乎人情規以考政治之得失關世運之替興時則有若春草集者焉春草集者蓋源乎比興而致文乎綺縟者也惟昔靈運凝思形西堂之幽夢文通惋别流南浦之瓌詞雖藻繪稱工而比興乏體僕自丱嵗即尚斯文鑽研百家殆垂三紀徒徇言辭之末罔窺理義之歸今則覿佳製而靦顔聆希音而心醉雖欲企蹤遐躅其道無繇輒復襲執後塵措詞未簡云爾蓉峰先生誄辭序辭附某年月日蓉峰先生宋公卒嵗星告徴少微掩耀松颷輟響蘿月罷照先是世道下降隱德中微蔑汶上之髙風踵終南之捷徑是以周生習隱孔氏獻嘲樊子虛聲漢廷讜議先生夙抱髙尚蚤企𤣥蹤龐公志樂於耦耕尚平期畢於婚嫁濳德靡耀嘉遁終身子惟席珍道光朝署右史職記言之重東朝推典學之尊九重加恩千里歸覲兼金屢錫於疏傅輜車特寵於桓榮篋賁萊衣家榮芰製水菽甫隆於愛日風木遽戚於終天吾道興嗟士林胥弔昔伯喈致哀於有道靖節見誄於延年異代同悲殊音共嘆伊豫小子邈迹先塵緬碧山而引懷睇白雲而抆涕式稽禮典爰述誄詞誄曰啓賔王室胙土受封玉産騷國蔚為詞宗𢎞登三事均顯九江矯矯令艾人中之龍嗟惟先生奕世髙蹈方駕嚴鄭追蹤夷皓漆園養恬蘇門長嘯丹霞非髙白雲同皎道輕軒冕志樂丘岑遡風解佩望雲披簮元酒寡味大吕希音篤生令子時惟國琛三釜娛親百年愛日掛冠遄歸安車寵錫榮謝列鼎歡逾捧檄陟岵纒悲蓼莪貽戚嗚呼哀哉在昔太丘海宇同弔亦有考叔錫類稱孝猗歟夫子異代同調生榮殁哀年髙德劭𤣥關暫闢泉臺永扃松月夕墮薤露宵零表石樹道新宫載銘小子述誄太史是徴贈醫者序天下一郡邑也一身一毫竅也善覘天下者睹一郡邑而天下可徴已善察疾者視一毫竅而一身可候已故以一邑之旱一郡之兵未足以亂天下也而禍亂之漸則自此始一毫之損一竅之滯未足以病一身也而疾病之萌則自此始善相善醫恆於是焉慎之方朝廷乂安四方無事下邑或水旱焉邉郡或寇興焉辨冕端委者優遊廟堂之上不曰水旱天數則曰鼠竊狗偷不足恤也太官未至於肉糜嚴城不接乎烽燧曠時引嵗日銷月爍不知天下已不可為已人當壯盛之時元氣充盛雖一毫或有損焉一竅或有滯焉彼其動作起居未異平日不曰膚髮之微則曰瘡痍之疾毋庸憂也飲食不聞乎慎節旅力未至乎衰憊浸淫荏苒氣血潛耗不知是身已不可藥已是皆不知防微杜漸未能謹乎內而遽忽其外者也昔之治天下者未始不重內而輕外不知四方之釁亦朝廷之漸也治疾者未始不急本而緩標不知瘡痍之萌亦腹心之候也使朝廷處置誠得其宜則四方之釁無自而起腹心榮衛不失其調則瘡痍之證曷從而生吾故曰郡邑者天下之徴而毫竅者一身之候也同郡吳仲祥以治瘡活人垂三十年豫切怪世人類忽瘡痍之微而不虞其為害甚大因論天下之事有類於醫者故因以贈云拙齊記天下之物巧拙相形而拙恆勝於巧非拙工於巧也拙得天而巧寓夫人爾昔者宋人刻玉楮三年而成一葉巧果何為哉離朱弗能索遺珠顧象罔得之拙果可廢乎同郡陳國光蚤精畫學而以拙名其齊居或者疑焉豫謂不然夫拙不足而後有巧巧者拙之靡也嘗試與子因畫而論之自宓犧造書契而畫存乎其中矣今觀山川之文而流峙之形賦焉日月之文而盈虛之理寓焉草木之文而萌蘖之情具焉魚鳥之文而飛潛之機著焉何所容其巧乎去古寖逺人僞日滋昔人謂書莫古於篆籀自一變為𨽻楷再變為行草而拙不可見矣豫亦謂畫莫古於林壑自一變為花卉再變為蟲鳥而巧不勝既矣今君寓名於拙庶幾有意於復古者哉雖然是未足以言夫拙也蓋豫幼嘗學嗜書習之纍年而罔知措其㸃畫比壯復嘗學琴亦勤之彌月而弗能布其指爪故凡天下之拙莫豫若也以君之意匠經營動肖天巧拙云乎哉然聞古有大巧若拙意者君之拙其殆近是乎豫將抱拙終身竊喜君之有志於是也遂為之記雪篷記人之於物可寓意而不可留意焉夫人亦天地間一物爾茍凝滯於是物交物則引之而已矣昔者劉伯倫之寓意於酒阮遙集之寓意於屐其迹似曠逺其中實留於物也君子欲玩物適情當於是辨之武川徐允恭早嵗遨遊湖海間玩雪篷之趣而有得焉既而惜其境之不常在也歸而繪諸圖以寓意焉豫謂是境在天地間固不能以常在而亦未嘗忘也昔豫家雙溪上每江空嵗晚積雪皓然孤篷短棹交錯洲渚間意未嘗不在是也信宿之後則平沙斷岸已失故態於是境與意相忘久矣然而每一見之意亦未嘗忘也今君之為是圖得非留意於物乎雖然楚則失矣齊亦未為得也自豫落城府向之所寓意者不特忘之而遂不可見矣嗟夫溟海浩瀚風波不時意者君將出為濟川之舟楫顧乃自放於荒煙野水之濵其將蟬蛻於汚濁乎抑將浮沉於斯世也吾聞昔人藏舟於壑夜半猶為有力者持去況皓皓之易汚耶吾懼或者按圖索驥則子雖欲為絶壑之虛舟不可得已安得與子載太古之雪泛無為之波以浮遊于太素之天乎尚絅齊集卷二
