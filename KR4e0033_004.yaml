body:
  text: 尚絅齋集巻四明童冀撰霅川集五言古詩題凝清軒三首髙齋闢華舘列榭臨清渠緑莎被文砌長楊映綺䟽芳洲雜蘅杜金塘擢芙蕖澄波蕩彩鷁弱藻栖文魚良辰啓華宴列坐徵名儒衣冠集觴詠歗歌謝笙竽香清凝綺席酒渌湛芳壺心賞自云逸日晏不知劬既醉歌太平桑扈詠樂胥逍遥寓宇内不樂復何如其二效陶靖節少無簪組念雅志在丘岑結廬古澗阿棲迹嘉樹林南軒納朝陽北牖延夕陰踵門無深轍入室有鳴琴良朋以時至清坐談古今秫田秋向熟濁醪行可斟傾筐擷園蔬持竿釣清潯歡飲聊共適過滿非所欽其三效韋蘇州髙軒臨曲澗長夏有餘清㣲風灑然至林木起秋聲焚香坐清晝素心澹無營幸㣲軒冕累庶免憂患嬰於陵樂灌園沮溺志耦耕晤言聊自適誰謂薄浮榮清芬室幽人抱髙尚結屋城南坰琴書有餘暇山林無俗情春蘭被後圃秋鞠麗前榮幽香適何來㣲風相與清竟日澹相對不為塵慮嬰逍遥一室内庶以全吾生贈别古人重送别送别惟贈言今人亦送别送别重華筵華筵亦何有水陸具醲鮮燕歌逐趙舞齊管間吳絃豈無一日歡顧為千日憐不如贈言好情意罄所宣上言保忠孝竹帛千古傳下言加餐飯相期黃髪年黃髪不易致青年當勉旃贈言良不多持此白圭篇送人之安慶皖城在何許乃在楚江湄客行良亦勤王事有程期揚艫出江浦挂席指中坻簡書豈不勞山水多清暉公餘肆遐矚退食常委蛇功名分所有氷蘗慎自持加餐何足道願子崇令儀寄永庠士友弱齡抱髙尚遯跡栖丘園胡為負鉛槧逺渉湘水源山水豈不佳風氣良亦淳况有二三子晨夕共討論寒暑未云易迢遥下吳門尺書昨夜至眷眷道殷勤矯首天一方永念懐故人江水日東流無縁復西奔惟應北風起目送南飛雲雲林書舍效陶靖節少微軒冕累雅志在林坰讀書三十年乃為塵事嬰束裝去京國遥遥抵南荆疾風吹單艫五月凌洞庭東還豈不樂尚阻千里程永懐園田蕪嵗月忽屢更披圖覿斯境依依念平生雲山諒悠邈緬焉起深情送人入京效隂常侍送客上京國弭節向春江山花為舞女江水當離觴單艫逾鳥疾疊浪似人忙明發東華路足踏軟塵香種徳堂種竹期作林種松望成隂種徳何所期乃在方寸心勿謂寸心小生意無古今勿謂萌蘖㣲拱把可十尋柯葉日以茂根本日以深尚慮斧斤伐莫使牛羊侵我歌聊自儆持用比心箴友竹軒伐木久輟響谷風遂成詩友道已不古况復叔世時耳餘亦搆隙寄䘵良可知君看友竹軒為事豈好奇擇交逮草木此意誠足悲管鮑不可作吾将誰與歸如在堂奉親有髙堂堂無百嵗親思親有孝子子無百年身親去日已逺我心諒如存入室想音容謦欬如有聞豈惟嚴烝嘗甘㫖方具陳皦皦心目間膝下奉晨昏我身良有盡我心浩無垠百年豈不長子後亦有孫所愧為人子莫報罔極㤙載歌蓼莪篇此恨終乾坤蘭雪軒猗猗謝庭蘭玉立美無度託根已得所况復依瓊樹天寒霜雪䌓祇恐嵗年暮春風不披拂何由覿情素所願晞春陽時時承湛露並蔕二色菊秋林已凋謝晚菊忽獻奇燁燁霜中英一榦各異姿初疑金玉蝶駢棲瑶樹枝又疑道家術變幻之所為我聞菊稟性真正恒自持胡為遂世暮革面非所希容色信可易本根諒難移所以古君子堅白無磷緇草木非所憐永為時世悲次張來儀題金華山居圖韻我昔采𤣥芝東上金盆山仙人五雲車可望不可攀授我日月鼎粲然鉛汞斑持歸石室中神光燭茅菅自從落城府嵗運亦已還頗聞青田鶴近自遼海還口銜五色圖飛下青㝠間山中舊茅屋言歸老雲闗丹液庶有成白首囬童顔送王鎮撫將軍官隴西家住東海頭隴水豈不長不入東海流將軍歸東海𦵏親海上洲獨有隴頭月相隨歸故丘隴月行復圓王事不可留再聽隴水鳴思親恨悠悠矯首海上雲只向天南浮願學海雲飛莫學隴水流七言送馬明府還蜀蜀道易昔如上青天今如履平地借問昔難今易之所由劒閣挿天猿猱愁水行復有黿鼉憂大明日月照九州山無險道江安流陸走秦鳳輦馬牛水下江漢無停舟蠻夷九譯職貢修東踰濊貊西渠搜馬卿家住錦水頭少年把酒㸔吳鈎祗今五十雙鬢秋萬里作官江海陬三年宰邑政理優桑麻接畛民歌謳問渠何事懐故丘春雨霜露悲松楸人生百年水上漚老我白髪思歸休前年東下岳陽樓冷官自可歸田疇苕溪又作三載留矯首先隴雲悠悠今年赴闕覲冕旒承恩幸復來滄洲石田茅屋山之幽一身湖海雲萍浮嗟君素志亦已酬太平歸鄉復何求歸故鄉守桑梓蜀道昔難今孔易千村萬落無荆杞但願千萬年薄海内外無逺邇遺民在在安田里太平有象自今始送劉簿歸雲中隂山六月天雨霜大磧草白塞雲黄邉民肉食無稻粱追逐水草隨牛羊劉郎家居古定襄少年走馬臨戰場上功幙府羞戎行束書甘作薇省郎將命専對行四方朅来佐邑東海傍幡然掛冠歸故鄉北風吹沙鴻鴈翔黄河十月冰無梁問君逺行奚所望闗河酒緑蒲匋香臂鷹走犬獵近岡歸來馬上懸兩狼後車捆載兎與獐割鮮行酒據胡床酒酣耳熱起徬徨少年此樂無時忘方今四夷盡來王塞上有土皆畊桑五風十雨時嵗康歸去歡樂殊未央人生百年誰短長鏡中贏得雙鬢蒼君今已謝名利韁笑我未識閒中忙冷官十年坐寒牕吾伊五夜聲琅琅三徑松菊日就荒把酒送君増慨慷仰視雲漢何茫茫明年詣闕上封章聖恩若許歸滄浪白首擊壤歌虞唐題廬山圖為潯陽張子善賦我昔放舟下江水拭眼廬山如畫裏披圖一别又十年却望雲山隔千里雲山於人殊有情開帆秀色遥相迎當時山靈不解事不邀我向山中行别來見山每相憶咫尺黄塵不相識三生宿縁知未盡又向君家看山色留侯子孫雪滿顛結茆正近廬山前山中采藥今幾年翩翩兩袖生雲煙我家金華好煙嶂赤松牧羊在其上知君有意相從遊蚤晚支笻一相訪題松隂巻送杜幕長杜郎家住淮水東早年學種徂徠松讀書牕前愛松緑日夜望松髙過屋蕭條兵火二十年有夢不到家山前長林大谷化荆棘蒼松久作爨下煙朅來之官向吳㑹松樹童童偃華盖官曹白日困簿書客邸清宵聴竽籟故園三徑久已荒東鄰西舍渾相忘昔時遺老無一在頽垣碧草如人長三年坐嘯長松下神武門髙冠好掛買舟載取明月歸更寫蒼松入圖畫人生出處非偶然問君宦游今幾年青雲得志自可樂白頭歸鄉也不惡莫士元山水歌吳興畫手古所傳近代復數莫士元莫郎畫山惟畫意不學吳人金碧繁前年為我冩岑寂落筆悲風動蕭瑟不知渾沌開何年絶壁猶含太古色兩株古木蒼蘚皮煙雲轇轕迴風吹廣樂秋張洞庭野鐵網夜起珊瑚枝林下古木荒茅茨緑蘿交絡簷間垂抱琴來訪者誰子路險不畏溪橋危顛崖石磴何逶迤仙人徃往凌丹梯九疑衡岳儼在目復恐有路通仇池我家金華山色裏見畫忽憶山中時明年春雨瑶草緑荷鍤歸採南山芝莫士元畫天下幾人畫古松近代獨稱唐棣好莫郎棣也里中子每見虬枝驚絶倒閉門一月坐風雨敗壁頹垣恣揮掃不知何年得神助意匠經營出天巧晴窻示我雙松圖滿幅煙雲生縹緲髙堂六月無炎蒸颯颯悲風起林杪蛟龍欲雨動鱗甲虎豹挐空奮牙爪孤根盤盤踞厚地髙標落落撑晴昊嘆息徂徠久荆棘何處丘原存合抱客邊忽遇許𤣥度要我林泉共幽討君家弁山古雲麓嵗嵗畊雲種碧草松根茯苓如斗大便擬服食思輕矯只恐明堂須棟梁長材未許山林老閻仲彬山水歌總章右相之子孫丹青名家今尚存老來寓隠吳市門白頭未覺兩眼昏荆闗范郭久擅場彬也醉來下筆親吳興作者何紛紛眼中忽復見此人髙堂雪壁埀縑素白日蒼茫起煙霧長林大谷少人行海闊天低風景暮蓬萊圓嶠不可到咫尺仙凡隔歸路丹崖瀑布懸秋旻入耳颯颯悲風度重岡復嶺雲氣連隂洞或有蛟龍眠人間霖雨不易至便欲辟榖求神仙丈人偶立秋風前悵望落日心悠然明朝拂衣下衡霍采芝共入商山煙題趙麟春郊散牧圖古人畫馬稱曹韓近代獨數趙集賢一往不可得筆法付與諸生傳天閑騋牝踰萬乗神定揮毫覺天勝人間覊靮不敢施散牧春郊見真性一疋膝坐雙足拳一疋噴吐嘘青煙就中一疋倚樹立雄心已馳青海邊雪峯上人今支遁不惜千金愛神駿客牕留我展畫圖復見開元閱清峻祗今驊騮世豈無虞坂徃往逢鹽車何如駑駘立仗下日飫太官三品芻題筆工温國寳詩巻古筆以竹資簡牘椎朴遲鈍古所服後人製穎乃神速工巧有餘拙不足書契而下篆籕續魯壁汲冢光煜煜張鍾嗣興尚圓熟妙用允屬中山族吳興作者首馮陸温氏父子踵其躅翰林雄文聨巨軸重之不啻連城玉紛紛末工事角逐文犀象管炫凡目吁嗟溫生老而秃世無具眼甘退伏百金不售久韞櫝安得一用古制復嗚呼安得一用古制復書契載覩羲皇俗題張來儀青山白雲圖天下幾人畫董元近代獨數髙房山房山不獨妙形似輔以丹碧増其妍往年未識廬山面曽向房山畫中見髙堂白日生雲煙分明坐我南康縣大山嵳峩倚天立倒捲銀河㵼空碧山山起伏争坡陀海濤出没晴雲多醉酣老眼重摩挲此身便欲栖煙蘿十年一夢隔雲海却向長江聞櫂歌青山於人如舊識滿眼黄塵非故國羞將白髪照滄浪咫尺家山歸未得先生舊業廬山前丹青蚤得房山傳還能作畫逺相寄白頭共賦歸來篇題王生瞻雲圖王郎家住越水東讀書養母越山中一朝薦書上藩府捧檄又逐西征鴻去年將命來霅水日日思親春雲起今年重到霅水頭看雲思親雙淚流自言少小失所怙鞠育恩深賴慈母母兮孝養猶有時父兮一别終天悲當年兵塵暗廣路大母年髙髮埀素山中一月食無魚日夕臨流心獨苦跰足弗憚百里遥六月火雲天宇髙鮮鱗深甕貯江水赬肩赤日行蓬蒿中途潦水深莫渉咫尺蒼茫失舟楫解衣抱甕身與俱甕沉鱗躍身為魚天髙茫茫誰與訴此水終年有人渡我聞此語心孔悲天道幽逺諒有知君不聞姜孝子舍側雙魚出江水又不聞王休徵天寒解衣魚出冰當時傳信書太史至今孝感人間稱百年幾人稱孝子九原有知猶不死古來上壽無百年紛紛泯沒誰與傳王郎有父亦有母母今白頭稱節婦一門孝節世所無教子復有瞻雲圖我作歌詩徵不誣他日太史春秋書題望雲巻他鄉見白雲故鄉有慈親慈親白首隔鄉縣白雲日日他鄉見雲飛有時還故山遊子為客何時還我願游子心相隨白雲去莫學白雲飛只共白雲住白雲住止吾親舍遊子晨昏居膝下坐令天下思親人歸去家山看白雲裁雲作春衣釀雲作春酒舉酒勸慈親願親千萬壽從今相期黄髪年子母人間永相守題江天雪景巻海風吹濤作山立遥天萬里雲一色天人薄暮剪飛花半夜寒光動窓白山人睡起僵欲扶摩挲醉眠猶糢糊推窓不知人在世拭眼一觀天地初乾坤渾沌含太素溟海茫茫隔煙霧霓旌羽蓋紛相迎咫尺蓬萊有歸路仙人鶴髪顔如童翺翔貝闕逰珠宫萬年瑶草凌寒碧千嵗蟠桃如日紅瓊林玉樹交相倚白鹿軒騰素鸞峙纎雲不動天無聲一色瓊田三萬里六龍海上飛金烏鵾雞啁哳鳴天衢剛風吹夢落人世却向蓬窗看畫圖黄金未就丹砂訣青鏡蕭蕭滿華髪從今更約三千年歸去三山白銀闕題蘇平仲詠梅花巻我懐蘇子瞻白髪謫嶺南當時梅花有佳句至今清氣遺江潭江南見耳孫氣貌殊不凡平生不識耕與蠶經史六藝俱沉酣昔年横經坐太學壁水浩蕩恩波涵髙堂忽念埀鶴髮丹陛一夕辭朝簮歸來結屋依蒼巖白日對客惟清談我家茅屋深烟嵐門前緑樹埀黄柑徵書一夕下巖穴長江萬里隨風帆雲根黄獨如斗大十年無夢擕長鑱讀君新詩如夢覺令我一唱嘆者三逋仙舊居偶一過夜雨蒼苔荒石龕南枝久己化荆棘縞衣無復來毵毿我方束書上京國百拙自嘆無一堪長途兩脚倦行役黄塵撲面羞青衫明年儻遂歸田約白首相見期無慚次張來儀金華山居圖韻我昔好山未識山趼足日日勞躋攀歸來小樓坐清晝佳處政在阿堵間蓬萊岱嶽豈不好挂㠶入海經東蠻崑崙靈鷲亦良逺流沙萬里經玉闗不如故園攬奇秀南北兩峯開髻鬟半生足跡不出境詎意天道如循環白頭南行近萬里壯心未闕官舡柁樓髙於屋長江利渉無險艱篷窗日日㸔山色脫畧塵鞅遺世患眼中臺殿盡荆棘巖岫無復金碧殷匡廬衡岳不可識殘碑斷礎弃草菅江山無情亦銷歇豈有大藥能駐顔孤舟歸來豈天意山泉尚許聽潺湲何物㣲官苦維縶幅巾行逐孤雲還煩君寫圖慰岑寂卧游償我平生閒石渠天䘵無夢到姓名久在丹臺班遊道場山追和東坡先生詩韻具區西南古雲麓聞有於莵嘯林谷何年天竺道人來結茅晏坐蒼山足雨花散落春漫漫四時香靄煙雲盤浮屠千尺倚晴漢方池六月鳴驚湍山僧閉門長不出白日跏趺惟文席清凉境界無業縁菩提善根由宿植洞庭龍女青雲鬟常時獻果來山間蓬萊方丈在人世安用入海求神山人間昏夜何時旦却望雲林在天半少年學道今白頭搔首東風一長嘆登道場山雲峯追和東坡先生逰徑山詩韻十年不見金華山嵗月閱人如逝川孤闕五千里復與山水相周旋朅來吳㑹浮闕庭下瞰神龍淵道塲秀色接朝暮有足未上髙峰巔荒山五夜殷燐火寳地一夕開青蓮浮屠突兀倚天半石磴百折何蜿蜒未將足力供眼界癡坐且學山僧禪豈無籃輿㨗飛歩亦有杖頭沽酒錢勞人本欲息四體何如一醉山中眠今晨登覽頗自適得意仰羡雲中鳶勞生宇内已頭白百年幾受憂患煎平生兩足厭奔走瘦笻獨許登山便同行况有二三子忽到絶頂心悠然蓬萊東望又清淺一笑回首三千年贈翠峯上人方壺仙人古詞伯千里聞風未曽識奇書名畫數相遺兵塵不一見顔色雲山望斷今已仙他生相見應千年翠峯上人逺相過下筆似得壺公傳髙齋反闗無俗客日對雲林寫蕭瑟丹青脫畧兒女姿篆籀横陳古人蹟古來草聖曽幾人近代獨數張藏真藏真一往不可得吾師醉來下筆親髙堂雲壁照人目運肘揮毫風雨速青天雲霧生晦㝠白日龍蛇起平陸枯藤老樹懸蒼煙珊瑚玉玦相鈎連郟鄏九鼎出泗水支祈鐵鎖淪重淵世人貴耳恒賤目奇寳往往弃道側虞公未信百里奚燕市自售千金骨半生湖海西復東春如社燕秋如鴻地肺山前踏蘿月天目嶺上眠松風十年鄉國不相見白首他鄉初㑹面形容未識聞語音知是山人共鄉縣握手訪舊心為驚舊交落落如晨星相知少年盡頭白却話故山雙眼青老我思歸歸未得咫尺江濤隔吴越慿君為我圖家山早晚東歸㸔山色罱泥行吴興河髙田下雨淋水蕩岸日低薄每嵗農民罱取河泥澆岸然不能髙也罱音覽吳人讀作儼音朝罱泥暮罱泥河水繞田河岸低吳中有田多滷舄河水髙於田數尺雨淋浪拍岸善崩嵗嵗罱泥増岸塍載泥船小水易入船頭踏船船尾立吳兒使竹勝使篙竹筐漉泥如濁醪水流泥滑僅沃焦岸上浮土何時髙此身便作淘河鳥河水終多河泥少君不聞越上之田髙於城連車引水千尺坑車聲軋軋夜達明田間濁水無時盈吳田苦澇越苦旱越水常慳吳水滿嗟乎世間至平惟水猶不平請君不用觀世情修圍行俗書作圩韻書無圩字疑當作圍吳田膏腴畝壹鍾吳地有米皆宿舂吳人畏水不畏旱只愁圍滿田水滿家家䕶圍如䕶墻老少罱泥河水傍前年差夫運官木半嵗風飡并水宿去年處處捉逃軍白日家家深閉門兩年無力修圍岸河水入田天不管今年官令催修圍河深罱泥泥亦無岸傍在處無剩土撑船逺向南山取大圍浩𣺌如望洋小圍不啻千畝強田家船小無十斛低岸長圍何日足朝輸百船防罅漏暮輸百船防水口船去船來來去頻岸上何曽土加厚問君圍岸何當成請君少待南山平燕銜泥燕銜泥年年飛向畫梁栖燕足猶懸舊時縷華屋年年换新主去年人作陌上塵今人不見去年春海棠花開春雨歇緑窻半掩珠簾掲十二䦨干春晝遲美人沉醉簫聲咽繁華一夢随飛煙燕子歸來如舊年昨日花開今日落得意春風且行樂花開花落年年春行樂年年非舊人却羨茅簷舊時燕主人嵗嵗長相見五言近體赴京遇雨留客邸次公叙韻積雨青燈暗羇人白髪生愁知清夜永老覺黒貂輕賓館悲長鋏泥塗畏逺程故山茅屋好漂泊愧浮名七言近體丁已晦日立春前年孤櫂泊錢塘去嵗三湘送鴈行萬里歸來猶是客一身強健即為鄉土牛鞭裏春先到野馬塵中日又長獨喜故園茅屋在小山松桂未全荒戊午生旦次丁己生旦詩韻去嵗三湘把酒巵洞庭煙浪𣺌無涯雲山易地懐鄉國風木終天感嵗時客裏交情貧獨在鏡中勲業鬢先知半生舊學皆荒落只有歸心不外馳承召入京朝退偶成陋儒華髪入金門也向彤廷預討論朝退每陪賢俊後詩成曽感帝王尊九重親為書宸翰多士人均仰聖恩共羡太平千載遇自嗟無力報乾坤早朝遇雨次公叙韻閶闔晨開扇影分風飄仙樂靜中聞九天雨露埀恩澤五色旌旗絢彩雲犀象效賝來絶域衣冠賜宴總元勲陋儒擬筆圖王㑹昭代于今政用文送人之京澤國深秋江雨晴郎官報政上神京金陵東望三山逺震澤西風幾日程雙闕曉瞻鳷鵲觀五雲天近鳳凰城定知朝罷承殊渥錫宴南宫預寵榮送郡守入覲陌頭官栁緑依依三月春風上帝畿京口帆移雙闕近鍾山日上五雲飛天開閶闔瞻龍衮樂奏簫韶有鳯儀想見在廷稱治最歸來五馬足光輝郡府公讌次太守韻二首江郊曉日迎丹詔一札綸音四海傳聖主九重親制作儒臣千里任承宣文章喜見隆三代京國遥瞻尺五天尚憶彤廷曽錫宴衣冠濟濟秩初筵其二昔年氶召趍京國曽聽東華曉漏傳廊廟䕫龍新黼黻藩垣方虎舊旬宣朝回青瑣依丹地酒賜黄封下九天此日江城迎鳳詔白頭猶得預華筵次郡守遊山詩韻一年忽忽春將暮下馬山亭暫解鞍晴日撲簾花氣暖晚風迎路麥秋寒青林佛寺明金刹白壁人家近翠巒知是公餘來問俗不因游衍事追歡贈風鑒田生二首湖上春風生緑波扣門有容逺相過開窓共愛青山好臨水方憐白髪多勲業鏡中還自笑聲名身後定如何雲間黄獨行堪斸歸去茅簷隠薜蘿少年功業已無心况復蕭蕭雪滿簮蔡澤生平空自許杜陵老去即長吟煙中草色孤村晚雨後松花一徑深正憶家山無限好隔林何處語幽禽贈醫者新築茅堂霅水湄喜無車馬到柴扉雨荒苔巷夫須合日上芸窗脉望飛丹室夜寒珠有暈華池春暖玉生肥不須更學壺公隠恐有文光動少㣲夫須莎也詩南山有䑓註脉望者何諷書中得一髮捲視四寸許如環而無端用力絶之兩頭滴水方士曰此脉望也蠧魚三食神仙字則化為此見雜爼移竹次以貞韻兼懐湘中士友泮水秋風吹鶴髪江湖夜雨憶魚竿客鄉賴有書聲好官舍新添竹色寒粉節飄香浮緑蟻錦箋題字寄青鸞美人逺隔瀟湘浦日暮碧雲天外看題翠㣲吟藁幽人結屋翠㣲裏日日哦詩面碧岑嵐氣曉侵書帙潤煙光暖入硯池深千金白璧無輕售三嘆朱絃有賞音珍重錦囊須什襲莫將聲價動雞林題清隠草堂在城中苕霅二水㑹處沈氏草堂何所有開門惟見白鷗波樓臺上下通雲氣城郭中間聽櫂歌一夏軒窓秋意早四時䦨檻月明多喜無車馬紅塵客時有髙人載酒過題松風閣若耶溪上毗盧閣萬箇長松繞屋青半空雨歇龍吟曉午夜風生鶴夢醒孤舟八月過彭蠡廣樂何年張洞庭我亦平生識天籟抱琴來就月中聽題黄龍洞湖州城北山如畫聞有黄龍宅上頭六月林巒常帶雨四時風物總成秋雲根下伏千年洞巖竇中藏百丈湫昭代于今崇秩祀只將明徳答神休題廣陵太守歸𦵏巻戎馬驅馳嵗月遷南柯一夢竟逰仙丁年有恨違鄉國丙舍猶憐有墓田幾處丘原存馬鬛誰家珪組尚蝉聨披圖不用重嗟感金粟荒岡澹暮煙觀東坡先生和胡完夫詩巻因次其韻完夫名宗愈常州人承恩出守鬢毛班趣召遄歸虎豹闗閶闔九重天帝所蓬萊方丈道家山一時文物隆三代百世才華重兩間獨怪買田陽羨約清朝何事也求閒五言近體題小畫四首秋水墜蓮房幽禽語夕陽故園歸未得飛夢繞林塘落日湖光净芳洲野蓼紅幽禽如有意獨立向秋風野水帶平沙叢篁映白花鳥啼人不見春盡客思家竹外幽花白山禽立晚風行人莫廻首不是故園中題扇面小景二首前山新雨過碧樹晚風寒可惜清秋景無人共倚䦨雲山澗底雲根濕林稍風葉鳴何時明月夜來此聽秋聲木石題江村片雨圖斜日江村外蒼茫片雨秋披圖忽相憶曽上岳陽樓題子昻學士所書詩後香奩佳句好知是舊王孫留得風流在生綃見墨痕息齋風竹夜久商飈起蕭蕭山月明小窗雲影亂無處覔秋聲次張來儀金華山居圖韻聞說山中路經年斷客行山人理歸屐莫遣緑苔生題鈎勒夾竹梅美人隔秋水贈我金錯刀願因青鳥使報之應瓊瑶銘手植檜杖銘質之堅聖澤存制之樸謝丹雘危能安持永年靈壽杖銘杖之靈危弗傾杖之壽持永久錫斯銘予汝銘劬生堂銘維天生民不能自生託體父母具人之形粤自提孩煦嫗食息訓我廸我迨于成立日月逾邁孝養弗時風木興感蓼莪纒悲炯炯音容儼在心目永言孝思惟日不足親去日逺我心弗忘我心之存我親在堂永念劬勞昊天罔極豈不百年痛猶一日奕奕髙堂陟降在兹百爾孫子永言孝思永言孝思以引弗替我作銘詩永錫爾類芸軒銘有序盈天地間惟萬物物之類有善惡故人之類亦有君子有小人使皆小人焉而無君子以治之則善類或幾乎熄矣惟物亦然故物之惡者斯有善者勝之是以蛇虺惡物也而雄黄足以禦之烏附毒藥也而蘦草有以制之然非徒勝之也又致其用有以藥夫病焉則夫君子之治小人也豈不足以俾之遷善改過而適於用也哉吳興顧祐蚤從予學未及卒業而仕奪其志其藏書之室曰芸軒弗忘其舊習也不逺千里來請予銘予惟芸辟蠧者也蟫之為蠧書之蠧也生既知有以辟之矣則夫為心之蠧者其可不思所以辟之也哉予故特為之銘俾之朝夕有所儆省云銘曰天地兩間物有萬類善惡既殊利害斯異各禀爾性各賦爾形胡不自靖利害相凌惟木之生惟蟻實蠧亦有蟫魚廼蠧緗素有鴷除蟻有芸辟蟫人惟物靈豈無厥心相彼世人厥蠧匪一耳蠧惟聲目蠧惟色口鼻四體臭味佚安惟心之蠧諒非一端曷以養心要在寡欲天理既明日用恒足心得其養百體具從推以治人曷止靖躬古之君子克自惕厲功加于時名埀後世士之為學希聖希賢念茲在茲終日乾乾傳滹川漁者傳滹川漁者鎮之藁城人也少留心問學屬海宇俶擾間闗戎旅中踰二十年及四方底定為當道者推轂長萬家邑時徵調繁急比邑長二率以事病免去漁者獨竭心政理以畢集以故上官無譴呵焉尋得告歸鄉里遂放浪山澤間所居去滹沱不數舍因自號曰滹川漁者云人或疑焉漁者嘆曰是豈不足遂吾志乎始吾之少也亦有志當世矣暨得宰一邑謂可以少攄吾志然操刀未習而遽製錦幸獲免去為榮多矣今優游田里鼓櫂扣舷煙水間是豈有志於鈎餌乎哉昔愚嘗鄙世之漁者矣操網罟腰笭箵以渉不測之淵偶獲尋常之鱗則軒然喜固足厭其志矣彼曽未覩任公子之所獲也夫任公子所獲猶小者耳彼曽未聞嚴光之獲髙致重名也然嚴光所獲亦未足多也彼猶未若吕尚之獲千乗國也然吾之志弗在是也非特志弗在是也才誠有所不逮也故吾所以假名扵是者非欲援古人以自髙也亦將持竿引綸相逐漁人舟子以逍遥餘年他非吾所志也予聞而韙之惜其志之弗白也為之傳云賛曰自昔逸人髙士弗屑世故往往自詭於畊牧屠釣間若滹川漁者其有志於是乎非耶然吕尚嚴光不可尚己視彼屑屑世故以漁獵勢利於尋常間者亦何可勝道哉題跋跋時苗留犢畫巻時苗留犢人槩稱其賢㢘則近乎矯情干譽時苗之志疑不出此也予切意其盖為務農敦本而然觀者盍於意外求之題張來儀楚江清曉圖右楚江清曉圖尋陽張羽來儀為予作也予别瀟湘五年每一念至雲山煙水瞭焉心目間因念結髪讀經書志聖賢學其能不遺忘者鮮矣展玩之餘書以自警跋王右軍十七帖墨本右軍十七帖刻于唐貞觀而歴代法帖勒于宋淳化後貞觀踰三百載其存者已鮮則貞觀所刻宜不多得也此帖刻畫精好予平生僅一二見然是帖初傳豈止什百而已哉由夫識焉者寡莫知愛重往往淪棄此盖其僅存者耳嗟夫豈特帖為然哉又予蚤嵗閱晉唐諸帖其刻畫或未盡善輒棄去不取後觀諸名家所藏善本與予向所見者盖無大相逺然後知向所棄者亦未易得也及得此本寳愛殊甚今三十年而所見益鮮則知世間凡物求其全美固不可得也嘗怪世之取士往往失於求備是以有遺才之嘆因論此帖為之慨然尚絅齋集巻四
